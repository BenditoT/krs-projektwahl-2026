<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>KRS Projekttage 2026</title>
<meta name="theme-color" content="#4A6A83">
<style>
:root {
  --krs-blau: #4A6A83;
  --krs-blau-dark: #354E62;
  --krs-blau-light: #E8EEF3;
  --krs-blau-lighter: #F4F7F9;
  --krs-orange: #E87722;
  --krs-orange-dark: #C0611A;
  --krs-orange-light: #FDF2E8;
  --krs-gelb: #F5B335;
  --krs-gelb-dark: #D89A22;
  --krs-gelb-light: #FEF7E6;
  --success: #2B8A3E;
  --success-bg: #EBFBEE;
  --error: #C92A2A;
  --error-bg: #FFF5F5;
  --bg: #FAFBFC;
  --bg-card: #FFFFFF;
  --bg-subtle: #F4F6F8;
  --text: #1A2332;
  --text-muted: #5C6370;
  --text-light: #8A92A0;
  --border: #DEE4EB;
  --border-strong: #C4CCD6;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --shadow-sm: 0 1px 2px rgba(26,35,50,0.04);
  --shadow: 0 2px 8px rgba(26,35,50,0.06);
  --shadow-lg: 0 8px 24px rgba(26,35,50,0.10);
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--text);line-height:1.55;min-height:100vh}
.container{max-width:760px;margin:0 auto;padding:16px}
header{background:linear-gradient(135deg,var(--krs-blau) 0%,var(--krs-blau-dark) 100%);color:white;padding:20px 16px 24px;text-align:center;box-shadow:var(--shadow);position:relative;overflow:hidden}
header::before{content:"";position:absolute;top:-50%;right:-10%;width:300px;height:300px;background:radial-gradient(circle,rgba(245,179,53,0.12) 0%,transparent 70%);pointer-events:none}
.header-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:12px}
.logo-wrapper{background:white;padding:8px 16px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.logo-wrapper img{height:48px;width:auto;display:block}
.event-title{font-size:22px;font-weight:700;letter-spacing:-0.3px;margin:0}
.event-subtitle{font-size:14px;opacity:0.9;font-weight:500}
.event-accent{color:var(--krs-gelb);font-weight:700}
.phase-indicator{position:absolute;top:12px;left:12px;background:rgba(245,179,53,0.25);color:white;padding:4px 10px;border-radius:4px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;z-index:2}
.card{background:var(--bg-card);border-radius:var(--radius-lg);padding:24px;margin-bottom:16px;box-shadow:var(--shadow);border:1px solid var(--border)}
h1{font-size:24px;margin:0 0 8px;font-weight:700;letter-spacing:-0.4px}
h2{font-size:20px;margin:0 0 16px;font-weight:700;letter-spacing:-0.3px}
h3{font-size:17px;margin:24px 0 12px;font-weight:600}
p{margin:0 0 12px;color:var(--text-muted)}
p:last-child{margin-bottom:0}
label{display:block;font-weight:600;font-size:14px;margin-bottom:8px;color:var(--text)}
input[type="text"],textarea,select{width:100%;padding:14px 16px;border:2px solid var(--border-strong);border-radius:var(--radius-sm);font-size:17px;font-family:inherit;transition:all var(--transition);background:white;font-weight:500}
input[type="text"]{letter-spacing:0.5px}
textarea{min-height:100px;resize:vertical;letter-spacing:0;line-height:1.5}
input[type="text"]:focus,textarea:focus,select:focus{outline:none;border-color:var(--krs-blau);box-shadow:0 0 0 3px rgba(74,106,131,0.15)}
input[type="text"].error,textarea.error{border-color:var(--error)}
.input-hint{font-size:13px;color:var(--text-muted);margin-top:6px}
.input-group{margin-bottom:20px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 24px;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;transition:all var(--transition);text-decoration:none;min-height:48px;white-space:nowrap}
.btn-primary{background:var(--krs-blau);color:white;box-shadow:0 2px 4px rgba(74,106,131,0.25)}
.btn-primary:hover:not(:disabled){background:var(--krs-blau-dark);transform:translateY(-1px);box-shadow:0 4px 8px rgba(74,106,131,0.3)}
.btn-primary:disabled{background:var(--border);color:var(--text-light);cursor:not-allowed;box-shadow:none}
.btn-secondary{background:white;color:var(--krs-blau);border:2px solid var(--krs-blau)}
.btn-secondary:hover{background:var(--krs-blau-light)}
.btn-accent{background:var(--krs-orange);color:white;box-shadow:0 2px 4px rgba(232,119,34,0.25)}
.btn-accent:hover:not(:disabled){background:var(--krs-orange-dark)}
.btn-ghost{background:transparent;color:var(--text-muted);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg-subtle);color:var(--text)}
.btn-full{width:100%}
.btn-small{padding:8px 14px;font-size:14px;min-height:36px}
.alert{padding:14px 16px;border-radius:var(--radius-sm);margin-bottom:16px;font-size:14px;line-height:1.5}
.alert-error{background:var(--error-bg);color:var(--error);border-left:4px solid var(--error)}
.alert-success{background:var(--success-bg);color:var(--success);border-left:4px solid var(--success)}
.alert-info{background:var(--krs-blau-light);color:var(--krs-blau-dark);border-left:4px solid var(--krs-blau)}
.alert-warning{background:var(--krs-gelb-light);color:var(--krs-gelb-dark);border-left:4px solid var(--krs-gelb)}
.projekt-grid{display:grid;grid-template-columns:1fr;gap:12px;margin:16px 0}
@media (min-width:640px){.projekt-grid{grid-template-columns:1fr 1fr}}
.projekt-card{background:white;border:2px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all var(--transition);position:relative;user-select:none;-webkit-tap-highlight-color:transparent}
.projekt-card:hover{border-color:var(--krs-blau);transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.projekt-card.selected-1{border-color:var(--krs-blau);background:var(--krs-blau-lighter);box-shadow:0 4px 12px rgba(74,106,131,0.15)}
.projekt-card.selected-2{border-color:var(--krs-orange);background:var(--krs-orange-light);box-shadow:0 4px 12px rgba(232,119,34,0.15)}
.projekt-card.selected-3{border-color:var(--krs-gelb);background:var(--krs-gelb-light);box-shadow:0 4px 12px rgba(245,179,53,0.15)}
.projekt-card .wahl-badge{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;color:white;box-shadow:0 2px 6px rgba(0,0,0,0.15)}
.projekt-card.selected-1 .wahl-badge{background:var(--krs-blau)}
.projekt-card.selected-2 .wahl-badge{background:var(--krs-orange)}
.projekt-card.selected-3 .wahl-badge{background:var(--krs-gelb);color:#5C3D00}
.projekt-titel{font-weight:700;font-size:17px;margin-bottom:4px;padding-right:40px;color:var(--text);letter-spacing:-0.2px}
.projekt-lehrer{font-size:13px;color:var(--text-muted);margin-bottom:10px;font-weight:500}
.projekt-beschreibung{font-size:14px;color:var(--text);line-height:1.5}
.projekt-klassen{display:inline-block;margin-top:10px;padding:3px 10px;background:var(--bg-subtle);border-radius:20px;font-size:12px;color:var(--text-muted);font-weight:500}
.status-bar{position:sticky;top:0;background:rgba(255,255,255,0.95);border-bottom:1px solid var(--border);padding:12px 16px;z-index:10;box-shadow:var(--shadow);backdrop-filter:blur(8px)}
.status-greet{font-size:13px;color:var(--text-muted);margin-bottom:8px;font-weight:500}
.status-wahlen{display:flex;gap:8px;flex-wrap:wrap}
.status-wahl{flex:1;min-width:100px;padding:10px;background:var(--bg-subtle);border-radius:var(--radius-sm);font-size:12px;text-align:center;border:2px solid var(--border);transition:all var(--transition)}
.status-wahl strong{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px}
.status-wahl .status-wahl-titel{font-weight:600;color:var(--text);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.status-wahl.filled{color:white;border-width:0}
.status-wahl.filled.w1{background:var(--krs-blau)}
.status-wahl.filled.w2{background:var(--krs-orange)}
.status-wahl.filled.w3{background:var(--krs-gelb);color:#5C3D00}
.status-wahl.filled .status-wahl-titel{color:inherit}
.stepper{display:flex;justify-content:center;align-items:center;gap:8px;margin-bottom:24px}
.step{width:32px;height:32px;border-radius:50%;background:var(--border);color:var(--text-muted);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;transition:all var(--transition)}
.step.active{background:var(--krs-blau);color:white;box-shadow:0 0 0 4px var(--krs-blau-light)}
.step.done{background:var(--success);color:white}
.step-line{width:24px;height:2px;background:var(--border)}
.step-line.done{background:var(--success)}
.actions{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap}
.actions .btn{flex:1;min-width:0}
.bestaetigung-box{background:linear-gradient(135deg,var(--krs-blau-lighter) 0%,white 100%);border:2px solid var(--krs-blau);border-radius:var(--radius);padding:24px;margin:16px 0;position:relative;overflow:hidden}
.bestaetigung-box::before{content:"";position:absolute;top:-30px;right:-30px;width:100px;height:100px;background:radial-gradient(circle,var(--krs-gelb-light) 0%,transparent 70%)}
.bestaetigung-box .label{font-size:12px;color:var(--krs-blau);font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px}
.bestaetigung-box .value{font-size:22px;font-weight:700;color:var(--text);margin-bottom:14px;letter-spacing:-0.3px}
.bestaetigung-box .value:last-child{margin-bottom:0}
.demo-badge{position:fixed;top:12px;right:12px;background:var(--krs-orange);color:white;padding:6px 10px;border-radius:4px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.8px;z-index:100;box-shadow:var(--shadow-lg)}
.phase-switcher{position:fixed;bottom:12px;right:12px;background:white;border:2px solid var(--krs-blau);padding:8px;border-radius:8px;font-size:11px;z-index:100;box-shadow:var(--shadow-lg)}
.phase-switcher select{padding:4px 8px;font-size:11px;border:1px solid var(--border);border-radius:4px;cursor:pointer}
footer{text-align:center;padding:24px 16px 40px;font-size:13px;color:var(--text-muted)}
footer a{color:var(--krs-blau);text-decoration:none;font-weight:500}
footer a:hover{text-decoration:underline}
.divider{margin:0 8px;color:var(--text-light)}
.text-center{text-align:center}
.emoji-large{font-size:56px;margin-bottom:12px}
.code-hint{display:inline-block;background:var(--bg-subtle);padding:3px 8px;border-radius:4px;font-family:'SF Mono',Menlo,Consolas,monospace;font-size:13px;border:1px solid var(--border);margin:0 2px}
.ergebnis-box{border:2px solid;border-radius:var(--radius-lg);padding:24px;margin:16px 0;position:relative;overflow:hidden}
.ergebnis-box.wahl-1{border-color:var(--krs-blau);background:var(--krs-blau-lighter)}
.ergebnis-box.wahl-2{border-color:var(--krs-orange);background:var(--krs-orange-light)}
.ergebnis-box.wahl-3{border-color:var(--krs-gelb);background:var(--krs-gelb-light)}
.ergebnis-box.wahl-none{border-color:var(--text-muted);background:var(--bg-subtle)}
.ergebnis-wahl-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.wahl-1 .ergebnis-wahl-label{color:var(--krs-blau)}
.wahl-2 .ergebnis-wahl-label{color:var(--krs-orange)}
.wahl-3 .ergebnis-wahl-label{color:var(--krs-gelb-dark)}
.wahl-none .ergebnis-wahl-label{color:var(--text-muted)}
.ergebnis-projekt-titel{font-size:24px;font-weight:800;margin-bottom:4px;color:var(--text)}
.ergebnis-lehrer{color:var(--text-muted);font-size:15px;margin-bottom:12px}
.ergebnis-beschreibung{color:var(--text);font-size:14px;line-height:1.5}
.tausch-status-box{padding:16px;border-radius:var(--radius);margin:16px 0;border:2px dashed var(--krs-gelb);background:var(--krs-gelb-light)}
@media print{.demo-badge,.phase-switcher,.actions,footer,header{display:none}.card{box-shadow:none;border:1px solid #ccc}}
.loading-overlay{position:fixed;inset:0;background:rgba(250,251,252,0.95);display:flex;align-items:center;justify-content:center;z-index:1000;flex-direction:column;gap:12px}
.loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--krs-blau);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.mode-badge{position:fixed;top:12px;right:12px;padding:6px 10px;border-radius:4px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.8px;z-index:100;box-shadow:var(--shadow-lg)}
.mode-badge.demo{background:var(--krs-orange);color:white}
.mode-badge.produktiv{background:var(--success);color:white;opacity:0.85}
</style>

<script>
// ===== krs-supabase-config.js (inline) =====
// Öffentlicher Schlüssel — darf im Frontend liegen. Schutz via RLS in Supabase.
window.KRS_SUPABASE = {
  url: 'https://uzynvvtsyjfmtywsfxtz.supabase.co',
  publishableKey: 'sb_publishable_kdZSmagc_sbq9qwynebcxw_hKdhyDt1',
  // Frontend-URL für Schüler-App (wird z.B. in Serienbriefen referenziert)
  schueler_url: 'https://benditot.github.io/krs-projektwahl-2026/schueler.html'
};
</script>
<script>
// ===== krs-supabase-service.js (inline) =====
// DataService (Dual-Mode: Demo + Produktiv) für KRS Projektwahl 2026.
(function () {
  'use strict';

  const CFG = window.KRS_SUPABASE || {};
  const HAS_SUPABASE =
    !!CFG.url &&
    !!(CFG.publishableKey || CFG.anonKey) &&
    typeof window.supabase !== 'undefined';

  function normalizeProjektPublic(row) {
    return {
      id: row.id,
      titel: row.titel,
      beschreibung: row.kurzbeschreibung || row.beschreibung || '',
      langbeschreibung: row.langbeschreibung || '',
      lehrer: row.lehrer_name || row.lehrer || '',
      ort: row.ort || '',
      min_klasse: row.min_klasse,
      max_klasse: row.max_klasse,
      bild_url: row.bild_url || null,
    };
  }

  function normalizeMockProjekt(row) {
    return {
      id: row.id,
      titel: row.titel,
      beschreibung: row.beschreibung || row.kurzbeschreibung || '',
      langbeschreibung: row.langbeschreibung || '',
      lehrer: row.lehrer || row.lehrer_name || '',
      ort: row.ort || '',
      min_klasse: row.min_klasse,
      max_klasse: row.max_klasse,
      freie_plaetze: row.freie_plaetze,
      bild_url: row.bild_url || null,
    };
  }

  class KrsDataService {
    constructor() {
      this.isDemo = !HAS_SUPABASE;
      this.mode = HAS_SUPABASE ? 'produktiv' : 'demo';
      if (!this.isDemo) {
        this.client = window.supabase.createClient(
          CFG.url,
          CFG.publishableKey || CFG.anonKey,
          {
            realtime: { params: { eventsPerSecond: 10 } },
            auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
          }
        );
      }
      this._dbUserCache = null;
      this._dbUserCacheAuthId = null;
      if (!this.isDemo) {
        this.client.auth.onAuthStateChange((_event, session) => {
          const newId = session && session.user ? session.user.id : null;
          if (newId !== this._dbUserCacheAuthId) {
            this._dbUserCache = null;
            this._dbUserCacheAuthId = null;
          }
        });
      }
    }

    // ---------- AUTH ----------
    async getSession() {
      if (this.isDemo) return null;
      const { data } = await this.client.auth.getSession();
      return data ? data.session : null;
    }
    async getCurrentUser() {
      if (this.isDemo) return null;
      const { data } = await this.client.auth.getUser();
      return data ? data.user : null;
    }
    async login(email, password) {
      if (this.isDemo) return { error: { message: 'Login nur im Produktiv-Modus verfügbar' } };
      return this.client.auth.signInWithPassword({
        email: String(email || '').trim().toLowerCase(),
        password: String(password || ''),
      });
    }
    async logout() {
      if (this.isDemo) return { error: null };
      this._dbUserCache = null;
      this._dbUserCacheAuthId = null;
      return this.client.auth.signOut();
    }
    async resetPasswordForEmail(email, redirectTo) {
      if (this.isDemo) return { error: { message: 'Passwort-Reset nur im Produktiv-Modus' } };
      const opts = {};
      if (redirectTo) opts.redirectTo = redirectTo;
      return this.client.auth.resetPasswordForEmail(
        String(email || '').trim().toLowerCase(),
        opts
      );
    }
    async updatePassword(newPassword) {
      if (this.isDemo) return { error: { message: 'Passwort ändern nur im Produktiv-Modus' } };
      return this.client.auth.updateUser({ password: String(newPassword || '') });
    }
    async isAdmin() {
      if (this.isDemo) return true;
      try {
        const { data, error } = await this.client.rpc('is_admin');
        if (error) return false;
        return data === true;
      } catch (_) { return false; }
    }
    async getCurrentDbUser() {
      if (this.isDemo) return null;
      const { data: { user } } = await this.client.auth.getUser();
      if (!user) { this._dbUserCache = null; this._dbUserCacheAuthId = null; return null; }
      if (this._dbUserCache && this._dbUserCacheAuthId === user.id) return this._dbUserCache;
      const { data, error } = await this.client
        .from('users')
        .select('id, kuerzel, email, name, rolle, klassenlehrer_von, auth_user_id')
        .eq('auth_user_id', user.id)
        .maybeSingle();
      if (error) { console.warn('[KRS] getCurrentDbUser:', error.message); return null; }
      this._dbUserCache = data || null;
      this._dbUserCacheAuthId = user.id;
      return this._dbUserCache;
    }
    async getCurrentDbUserId() {
      const u = await this.getCurrentDbUser();
      return u ? u.id : null;
    }
    onAuthStateChange(callback) {
      if (this.isDemo) return { unsubscribe: () => {} };
      const { data } = this.client.auth.onAuthStateChange((_event, session) => {
        try { callback(session); } catch (e) { console.error('[KRS] auth handler:', e); }
      });
      return { unsubscribe: () => { try { data.subscription.unsubscribe(); } catch (_) {} } };
    }
    async _resolveBearbeiterId(explicit) {
      if (explicit !== undefined && explicit !== null) return explicit;
      if (this.isDemo) return null;
      try { return await this.getCurrentDbUserId(); } catch (_) { return null; }
    }

    // ---------- SYSTEM-SETTINGS ----------
    async getPhase() {
      if (this.isDemo) return window.MOCK_PHASE || 'anmeldung';
      const { data, error } = await this.client
        .from('system_settings').select('value').eq('key', 'phase').maybeSingle();
      if (error) throw new Error('getPhase: ' + error.message);
      if (!data) return 'anmeldung';
      const v = data.value;
      if (typeof v === 'string') return v;
      if (v && typeof v === 'object' && v.state) return v.state;
      return String(v || 'anmeldung').replace(/^"|"$/g, '');
    }
    async getSystemSetting(key) {
      if (this.isDemo) return null;
      const { data, error } = await this.client
        .from('system_settings').select('value').eq('key', key).maybeSingle();
      if (error) throw new Error('getSystemSetting(' + key + '): ' + error.message);
      return data ? data.value : null;
    }
    async setPhase(newPhase) {
      if (this.isDemo) { window.MOCK_PHASE = newPhase; return { success: true }; }
      const { error } = await this.client
        .from('system_settings')
        .upsert({ key: 'phase', value: JSON.stringify(newPhase) }, { onConflict: 'key' });
      if (error) throw new Error('setPhase: ' + error.message);
      return { success: true };
    }
    async setSystemSetting(key, value) {
      if (this.isDemo) return { success: true };
      const { error } = await this.client
        .from('system_settings')
        .upsert({ key, value }, { onConflict: 'key' });
      if (error) throw new Error('setSystemSetting(' + key + '): ' + error.message);
      return { success: true };
    }

    // ---------- USERS ----------
    async createUser(payload) {
      if (this.isDemo) {
        const id = (crypto.randomUUID && crypto.randomUUID()) || String(Date.now());
        const neu = { id, ...payload };
        (window.MOCK_USERS ||= []).push(neu);
        return neu;
      }
      const { data, error } = await this.client.from('users').insert(payload).select('*').single();
      if (error) throw new Error('createUser: ' + error.message);
      return data;
    }
    async updateUser(id, patch) {
      if (this.isDemo) {
        const arr = window.MOCK_USERS || [];
        const u = arr.find(x => x.id === id);
        if (u) Object.assign(u, patch);
        return u;
      }
      const { data, error } = await this.client.from('users').update(patch).eq('id', id).select('*').single();
      if (error) throw new Error('updateUser: ' + error.message);
      return data;
    }
    async deleteUser(id) {
      if (this.isDemo) {
        const arr = window.MOCK_USERS || [];
        const i = arr.findIndex(x => x.id === id);
        if (i !== -1) arr.splice(i, 1);
        return { id };
      }
      const { error } = await this.client.from('users').delete().eq('id', id);
      if (error) throw new Error('deleteUser: ' + error.message);
      return { id };
    }
    async listUsers() {
      if (this.isDemo) return window.MOCK_USERS || [];
      const { data, error } = await this.client
        .from('users').select('id, email, name, rolle, kuerzel, klassenlehrer_von').order('name');
      if (error) throw new Error('listUsers: ' + error.message);
      return data || [];
    }

    // ---------- SCHÜLER ----------
    async listSchueler() {
      if (this.isDemo) return window.MOCK_SCHUELER_LISTE || [];
      const { data, error } = await this.client
        .from('schueler').select('*').order('klasse').order('nachname');
      if (error) throw new Error('listSchueler: ' + error.message);
      return data || [];
    }
    async getSchuelerStatus(code) {
      const cleanCode = String(code || '').toUpperCase().trim();
      if (!cleanCode) return { success: false, error: 'code_fehlt' };
      if (this.isDemo) {
        const src = window.MOCK_SCHUELER || {};
        const s = src[cleanCode];
        if (!s) return { success: false, error: 'code_unbekannt' };
        const phase = window.MOCK_PHASE || 'anmeldung';
        const out = {
          success: true, phase,
          schueler: { code: cleanCode, vorname: s.vorname, nachname: s.nachname, klasse: s.klasse, klassenstufe: s.klassenstufe },
          hat_gewaehlt: !!(s.status && s.status.hat_gewaehlt),
          hat_zuteilung: !!(s.status && s.status.zuteilung),
          hat_offenen_tausch: !!(s.status && s.status.offener_tausch),
        };
        if (s.status && s.status.zuteilung) {
          out.zuteilung = { projekt_id: s.status.zuteilung.projekt_id, wahl_nr: s.status.zuteilung.wahl_nr };
        }
        return out;
      }
      const { data, error } = await this.client.rpc('get_schueler_status', { p_code: cleanCode });
      if (error) throw new Error('getSchuelerStatus: ' + error.message);
      return data || { success: false, error: 'unbekannt' };
    }

    // ---------- PROJEKTE ----------
    async listProjektePublic() {
      if (this.isDemo) {
        const src = window.MOCK_PROJEKTE || [];
        return src.map(normalizeMockProjekt);
      }
      const { data, error } = await this.client.from('projekte_public').select('*').order('titel');
      if (error) throw new Error('listProjektePublic: ' + error.message);
      return (data || []).map(normalizeProjektPublic);
    }
    async listProjekte() {
      if (this.isDemo) {
        const src = window.MOCK_PROJEKTE || [];
        return src.map(normalizeMockProjekt);
      }
      const { data, error } = await this.client
        .from('projekte').select('*, lehrer:users!lehrer_id(name, kuerzel)').order('titel');
      if (error) throw new Error('listProjekte: ' + error.message);
      return data || [];
    }
    async createProjekt(payload) {
      if (this.isDemo) {
        const id = (crypto.randomUUID && crypto.randomUUID()) || String(Date.now());
        const neu = { id, ...payload, created_at: new Date().toISOString() };
        (window.MOCK_PROJEKTE ||= []).push(neu);
        return neu;
      }
      const { data, error } = await this.client.from('projekte').insert(payload).select('*').single();
      if (error) throw new Error('createProjekt: ' + error.message);
      return data;
    }
    async updateProjekt(id, patch) {
      if (this.isDemo) {
        const arr = window.MOCK_PROJEKTE || [];
        const p = arr.find(x => x.id === id);
        if (p) Object.assign(p, patch);
        return p;
      }
      const { data, error } = await this.client
        .from('projekte').update(patch).eq('id', id).select('*').single();
      if (error) throw new Error('updateProjekt: ' + error.message);
      return data;
    }
    async deleteProjekt(id) {
      if (this.isDemo) {
        const arr = window.MOCK_PROJEKTE || [];
        const i = arr.findIndex(x => x.id === id);
        if (i !== -1) arr.splice(i, 1);
        return { id };
      }
      const { error } = await this.client.from('projekte').delete().eq('id', id);
      if (error) throw new Error('deleteProjekt: ' + error.message);
      return { id };
    }

    // ---------- WAHLEN ----------
    async createWahl({ code, vorname, nachname, erstwahl_id, zweitwahl_id, drittwahl_id }) {
      if (this.isDemo) {
        const src = window.MOCK_SCHUELER || {};
        const cleanCode = String(code || '').toUpperCase().trim();
        const s = src[cleanCode];
        if (!s) return { success: false, error: 'ungueltiger_code' };
        if (
          String(s.vorname || '').trim().toLowerCase() !== String(vorname || '').trim().toLowerCase() ||
          String(s.nachname || '').trim().toLowerCase() !== String(nachname || '').trim().toLowerCase()
        ) return { success: false, error: 'name_stimmt_nicht' };
        if (s.status && s.status.hat_gewaehlt) return { success: false, error: 'bereits_angemeldet' };
        const ids = [erstwahl_id, zweitwahl_id, drittwahl_id];
        if (new Set(ids).size !== 3) return { success: false, error: 'unterschiedliche_wahlen' };
        s.status = {
          hat_gewaehlt: true,
          wahlen: { erstwahl_id, zweitwahl_id, drittwahl_id, gewaehlt_am: new Date().toISOString() },
        };
        return { success: true, schueler_code: cleanCode, vorname: s.vorname };
      }
      const { data, error } = await this.client.rpc('create_wahl', {
        p_code: String(code || '').toUpperCase().trim(),
        p_vorname_bestaetigung: String(vorname || ''),
        p_nachname_bestaetigung: String(nachname || ''),
        p_erstwahl: erstwahl_id,
        p_zweitwahl: zweitwahl_id,
        p_drittwahl: drittwahl_id,
      });
      if (error) throw new Error('createWahl: ' + error.message);
      return data || { success: false, error: 'keine_antwort' };
    }

    // ---------- TAUSCHWÜNSCHE ----------
    async createTauschwunsch({ code, vorname, nachname, nach_projekt_id, begruendung }) {
      if (this.isDemo) {
        if (String(begruendung || '').trim().length < 10) {
          return { success: false, error: 'begruendung_zu_kurz' };
        }
        return { success: true };
      }
      const { data, error } = await this.client.rpc('create_tauschwunsch', {
        p_code: String(code || '').toUpperCase().trim(),
        p_vorname_bestaetigung: String(vorname || ''),
        p_nachname_bestaetigung: String(nachname || ''),
        p_nach_projekt_id: nach_projekt_id,
        p_begruendung: String(begruendung || ''),
      });
      if (error) throw new Error('createTauschwunsch: ' + error.message);
      return data || { success: false, error: 'keine_antwort' };
    }
    async listTauschwuensche() {
      if (this.isDemo) return [];
      const { data, error } = await this.client
        .from('offene_tauschwuensche').select('*').order('created_at', { ascending: true });
      if (error) throw new Error('listTauschwuensche: ' + error.message);
      return data || [];
    }
    async genehmigeTausch(tauschId, bearbeiterId) {
      if (this.isDemo) return { success: true };
      const bid = await this._resolveBearbeiterId(bearbeiterId);
      const { data, error } = await this.client.rpc('genehmige_tauschwunsch', {
        p_tausch_id: tauschId, p_bearbeiter_id: bid,
      });
      if (error) throw new Error('genehmigeTausch: ' + error.message);
      return data || { success: false, error: 'keine_antwort' };
    }
    async lehnTauschAb(tauschId, grund = null, bearbeiterId) {
      if (this.isDemo) return { success: true };
      const bid = await this._resolveBearbeiterId(bearbeiterId);
      const { data, error } = await this.client.rpc('lehn_tauschwunsch_ab', {
        p_tausch_id: tauschId, p_grund: grund, p_bearbeiter_id: bid,
      });
      if (error) throw new Error('lehnTauschAb: ' + error.message);
      return data || { success: false, error: 'keine_antwort' };
    }
    async genehmige1zu1Tausch(tauschA, tauschB, bearbeiterId) {
      if (this.isDemo) return { success: true };
      const bid = await this._resolveBearbeiterId(bearbeiterId);
      const { data, error } = await this.client.rpc('genehmige_1zu1_tausch', {
        p_tausch_a: tauschA, p_tausch_b: tauschB, p_bearbeiter_id: bid,
      });
      if (error) throw new Error('genehmige1zu1Tausch: ' + error.message);
      return data || { success: false, error: 'keine_antwort' };
    }
    async withdrawTauschwunsch({ code, vorname, nachname }) {
      if (this.isDemo) return { success: true };
      const { data, error } = await this.client.rpc('withdraw_tauschwunsch', {
        p_code: String(code || '').toUpperCase().trim(),
        p_vorname_bestaetigung: String(vorname || ''),
        p_nachname_bestaetigung: String(nachname || ''),
      });
      if (error) throw new Error('withdrawTauschwunsch: ' + error.message);
      return data || { success: false, error: 'keine_antwort' };
    }

    // ---------- ZUTEILUNGEN ----------
    async listZuteilungen() {
      if (this.isDemo) return window.MOCK_ZUTEILUNGEN || [];
      const { data, error } = await this.client.from('zuteilungen_detail').select('*');
      if (error) throw new Error('listZuteilungen: ' + error.message);
      return data || [];
    }

    // ---------- VERTEILUNG ----------
    async runVerteilung({ seed = null, commit = false, bearbeiterId } = {}) {
      if (this.isDemo) {
        if (typeof window.VerteilungsAlgorithmus !== 'function') {
          return { success: false, error: 'demo_algorithmus_nicht_geladen' };
        }
        const algo = new window.VerteilungsAlgorithmus();
        const projekte = (window.MOCK_PROJEKTE || []).map(normalizeMockProjekt);
        const schueler = (typeof window.generateTestSchueler === 'function')
          ? window.generateTestSchueler(projekte) : [];
        try {
          const result = algo.verteile({ schueler, projekte, seed: seed || undefined });
          return { success: true, committed: !!commit, ...result };
        } catch (e) {
          return { success: false, error: String(e && e.message || e) };
        }
      }
      const bid = await this._resolveBearbeiterId(bearbeiterId);
      const { data, error } = await this.client.rpc('run_verteilung', {
        p_seed: seed, p_commit: !!commit, p_bearbeiter_id: bid,
      });
      if (error) throw new Error('runVerteilung: ' + error.message);
      return data || { success: false, error: 'keine_antwort' };
    }
    async updateZuteilung({ code, projektId, bearbeiterId, kommentar = null }) {
      const cleanCode = String(code || '').toUpperCase().trim();
      if (!cleanCode || !projektId) return { success: false, error: 'parameter_fehlen' };
      if (this.isDemo) {
        const arr = window.MOCK_ZUTEILUNGEN || (window.MOCK_ZUTEILUNGEN = []);
        const i = arr.findIndex(z => String(z.schueler_code || '').toUpperCase() === cleanCode);
        if (i !== -1) arr[i].projekt_id = projektId;
        else arr.push({ schueler_code: cleanCode, projekt_id: projektId, wahl_nr: 0 });
        return { success: true };
      }
      const bid = await this._resolveBearbeiterId(bearbeiterId);
      const { data, error } = await this.client.rpc('update_zuteilung', {
        p_schueler_code: cleanCode, p_neues_projekt_id: projektId,
        p_bearbeiter_id: bid, p_kommentar: kommentar,
      });
      if (error) throw new Error('updateZuteilung: ' + error.message);
      return data || { success: false, error: 'keine_antwort' };
    }
    async listVerteilungen() {
      if (this.isDemo) return window.MOCK_VERTEILUNGEN || [];
      const { data, error } = await this.client
        .from('verteilungen_uebersicht').select('*').order('gestartet_am', { ascending: false });
      if (error) throw new Error('listVerteilungen: ' + error.message);
      return data || [];
    }

    // ---------- REALTIME ----------
    _sub(table, channelName, callback) {
      if (this.isDemo) return { unsubscribe: () => {} };
      const ch = this.client
        .channel(channelName)
        .on('postgres_changes', { event: '*', schema: 'public', table }, (payload) => {
          try { callback(payload); } catch (e) { console.error('[KRS] Realtime-Handler:', e); }
        })
        .subscribe();
      return { unsubscribe: () => { try { this.client.removeChannel(ch); } catch (_) {} } };
    }
    subscribeProjekte(cb)    { return this._sub('projekte',       'rt-projekte-' + Math.random().toString(36).slice(2,8), cb); }
    subscribeWahlen(cb)      { return this._sub('wahlen',         'rt-wahlen-'   + Math.random().toString(36).slice(2,8), cb); }
    subscribeZuteilungen(cb) { return this._sub('zuteilungen',    'rt-zut-'      + Math.random().toString(36).slice(2,8), cb); }
    subscribeTauschwuensche(cb){ return this._sub('tauschwuensche','rt-tausch-' + Math.random().toString(36).slice(2,8), cb); }
    subscribeVerteilungen(cb){ return this._sub('verteilungen',   'rt-vert-'    + Math.random().toString(36).slice(2,8), cb); }
  }

  window.KrsDataService = KrsDataService;
  window.KRS_MODE = HAS_SUPABASE ? 'produktiv' : 'demo';
  console.info('[KRS] DataService bereit — Modus:', window.KRS_MODE);
})();
</script>

    beschreibung: 'Wir gestalten große Gemeinschafts-Leinwände, die später die Schule schmücken.',
    min_klasse: 5, max_klasse: 9, freie_plaetze: 6 },
];

// Test-Schüler mit unterschiedlichen Status
const MOCK_SCHUELER = {
  '7B-A7K2': { vorname: 'Max', nachname: 'Mustermann', klasse: '7b', klassenstufe: 7, 
    status: { hat_gewaehlt: true, zuteilung: { projekt_id: 'p4', wahl_nr: 1 } }},
  '5A-B3X9': { vorname: 'Lisa', nachname: 'Musterfrau', klasse: '5a', klassenstufe: 5,
    status: { hat_gewaehlt: true, zuteilung: { projekt_id: 'p6', wahl_nr: 2 } }},
  '9C-K7M2': { vorname: 'Tom', nachname: 'Beispiel', klasse: '9c', klassenstufe: 9,
    status: { hat_gewaehlt: true, zuteilung: { projekt_id: 'p1', wahl_nr: 3 } }},
  '8A-T4P1': { vorname: 'Anna', nachname: 'Schmidt', klasse: '8a', klassenstufe: 8,
    status: { hat_gewaehlt: false }},
};

// Demo-Mocks auf window legen, damit der DataService sie im Demo-Modus findet
window.MOCK_PROJEKTE = MOCK_PROJEKTE;
window.MOCK_SCHUELER = MOCK_SCHUELER;

// === APP ===
function App() {
  // DataService: auto-detect Demo vs. Produktiv anhand der Credentials
  const service = useMemo(() => new window.KrsDataService(), []);
  const mode = service.mode; // 'demo' | 'produktiv'
  window.MOCK_PHASE = window.MOCK_PHASE || 'anmeldung';

  const [phase, setPhase] = useState(mode === 'demo' ? (window.MOCK_PHASE || 'anmeldung') : 'anmeldung');
  const [view, setView] = useState('start'); // start | code-eingabe | ...
  const [code, setCode] = useState('');
  const [codeError, setCodeError] = useState('');
  const [schueler, setSchueler] = useState(null);
  const [wahlen, setWahlen] = useState({ w1: null, w2: null, w3: null });
  const [tauschwunsch, setTauschwunsch] = useState(null);
  const [projekteAll, setProjekteAll] = useState([]);
  const [loading, setLoading] = useState(true);
  const [submitting, setSubmitting] = useState(false);
  const [submitError, setSubmitError] = useState('');

  // Phase in Produktivmodus aus system_settings laden (+ Realtime, falls später auf Wahlen reagiert werden soll)
  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        if (mode === 'produktiv') {
          const p = await service.getPhase();
          if (!cancelled && p) setPhase(p);
        }
      } catch (e) { console.warn('[KRS] getPhase:', e); }
    })();
    return () => { cancelled = true; };
  }, [service, mode]);

  // Projekte laden + Realtime-Update bei Änderungen
  useEffect(() => {
    let cancelled = false;
    async function load() {
      try {
        const arr = await service.listProjektePublic();
        if (!cancelled) setProjekteAll(arr);
      } catch (e) {
        console.error('[KRS] listProjektePublic:', e);
      } finally {
        if (!cancelled) setLoading(false);
      }
    }
    load();
    const sub = service.subscribeProjekte(() => load());
    return () => { cancelled = true; try { sub.unsubscribe(); } catch(_) {} };
  }, [service]);

  useEffect(() => {
    const sw = document.getElementById('phase-switcher');
    if (sw) {
      sw.value = phase;
      sw.onchange = (e) => {
        setPhase(e.target.value);
        if (mode === 'demo') window.MOCK_PHASE = e.target.value;
        setView('start');
        setSchueler(null);
        setCode('');
      };
    }
  }, [phase, mode]);

  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const urlCode = params.get('code');
    if (urlCode) {
      setCode(urlCode.toUpperCase());
      // handleCodeSubmit wird beim nächsten Render sichtbar — kurzer Tick reicht
      setTimeout(() => handleCodeSubmit(urlCode), 0);
    }
  }, []);

  // Schüler-Status über DataService laden (RPC in Produktiv, Mock in Demo)
  const handleCodeSubmit = async (codeToCheck) => {
    const cleanCode = (codeToCheck || code).toUpperCase().trim();
    if (!cleanCode) {
      setCodeError('Bitte gib deinen Code ein.');
      return;
    }
    try {
      const res = await service.getSchuelerStatus(cleanCode);
      if (!res || !res.success) {
        setCodeError('Dieser Code ist nicht bekannt. Bitte prüfe deinen Brief.');
        return;
      }
      const s = {
        code: res.schueler.code,
        vorname: res.schueler.vorname,
        nachname: res.schueler.nachname,
        klasse: res.schueler.klasse,
        klassenstufe: res.schueler.klassenstufe,
        status: {
          hat_gewaehlt: !!res.hat_gewaehlt,
          zuteilung: res.hat_zuteilung ? res.zuteilung : null,
          hat_offenen_tausch: !!res.hat_offenen_tausch,
        },
      };
      setSchueler(s);
      setCodeError('');

      // Phasen-Routing — Phase aus RPC bevorzugen (Produktiv); sonst lokale Phase
      const effectivePhase = res.phase || phase;
      if (effectivePhase === 'anmeldung') {
        if (s.status.hat_gewaehlt) setView('bereits-angemeldet');
        else setView('bestaetigung');
      } else if (effectivePhase === 'verteilung') {
        setView('verteilung-laeuft');
      } else if (effectivePhase === 'nachbearbeitung' || effectivePhase === 'projekttage') {
        if (s.status.zuteilung) setView('mein-ergebnis');
        else if (s.status.hat_gewaehlt) setView('warten-auf-verteilung');
        else setView('nicht-angemeldet');
      }
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } catch (e) {
      console.error('[KRS] handleCodeSubmit:', e);
      setCodeError('Moment — die Verbindung zum Server klappt gerade nicht. Versuch es gleich nochmal.');
    }
  };

  const passendeProjekte = useMemo(() => {
    if (!schueler) return [];
    return projekteAll.filter(p =>
      schueler.klassenstufe >= p.min_klasse && schueler.klassenstufe <= p.max_klasse
    );
  }, [schueler, projekteAll]);
  
  const handleProjektClick = (projektId) => {
    const current = { ...wahlen };
    if (current.w1 === projektId) current.w1 = null;
    else if (current.w2 === projektId) current.w2 = null;
    else if (current.w3 === projektId) current.w3 = null;
    else if (!current.w1) current.w1 = projektId;
    else if (!current.w2) current.w2 = projektId;
    else if (!current.w3) current.w3 = projektId;
    else return;
    setWahlen(current);
  };
  
  const getWahlNr = (projektId) => {
    if (wahlen.w1 === projektId) return 1;
    if (wahlen.w2 === projektId) return 2;
    if (wahlen.w3 === projektId) return 3;
    return 0;
  };
  
  const alleDrei = wahlen.w1 && wahlen.w2 && wahlen.w3;
  const anzahl = (wahlen.w1?1:0) + (wahlen.w2?1:0) + (wahlen.w3?1:0);

  // Wahl absenden — ruft RPC create_wahl (prüft Namen, Phase, Duplikate serverseitig)
  const absendenWahl = async () => {
    if (!schueler || !alleDrei) return;
    setSubmitting(true);
    setSubmitError('');
    try {
      const res = await service.createWahl({
        code: schueler.code,
        vorname: schueler.vorname,
        nachname: schueler.nachname,
        erstwahl_id: wahlen.w1,
        zweitwahl_id: wahlen.w2,
        drittwahl_id: wahlen.w3,
      });
      if (!res || !res.success) {
        const code = (res && res.error) || 'unbekannt';
        const msg = {
          anmeldung_geschlossen: 'Die Anmeldung ist gerade nicht geöffnet.',
          ungueltiger_code: 'Dein Code wird leider nicht erkannt.',
          name_stimmt_nicht: 'Name und Code passen nicht zusammen.',
          bereits_angemeldet: 'Du hast bereits eine Wahl abgegeben.',
          unterschiedliche_wahlen: 'Die drei Projekte müssen unterschiedlich sein.',
        }[code] || ('Es gab ein Problem (' + code + '). Bitte sag deinem Klassenlehrer Bescheid.');
        setSubmitError(msg);
        return;
      }
      setView('fertig-angemeldet');
    } catch (e) {
      console.error('[KRS] absendenWahl:', e);
      setSubmitError('Keine Verbindung zum Server. Bitte noch einmal probieren.');
    } finally {
      setSubmitting(false);
    }
  };

  const reset = () => {
    setView('start');
    setSchueler(null);
    setCode('');
    setWahlen({ w1: null, w2: null, w3: null });
    setTauschwunsch(null);
    setSubmitError('');
  };
  
  const phaseLabels = {
    setup: 'Vor Anmeldestart',
    anmeldung: 'Anmeldung läuft',
    verteilung: 'Verteilung läuft',
    nachbearbeitung: 'Ergebnisse verfügbar',
    projekttage: 'Projekttage-Zeit'
  };
  
  return html`
    ${mode === 'demo' && html`<div class="mode-badge demo" title="Demo-Modus — keine echten Daten">Demo</div>`}
    ${mode === 'produktiv' && html`<div class="mode-badge produktiv" title="Verbunden mit Supabase">Live</div>`}
    ${loading && html`
      <div class="loading-overlay">
        <div class="loading-spinner"></div>
        <div style="color:var(--text-muted);font-size:14px">Lade Projekte …</div>
      </div>
    `}
    <header>
      <div class="phase-indicator">${phaseLabels[phase]}</div>
      <div class="header-content">
        <div class="logo-wrapper">
          <img src=${LOGO_SRC} alt="KRS" />
        </div>
        <div>
          <div class="event-title">Projekttage 2026</div>
          <div class="event-subtitle">
            <span class="event-accent">21.–23. Juli</span> · Schulfest 23. Juli
          </div>
        </div>
      </div>
    </header>

    <div class="container">
      ${view === 'start' && html`<${StartScreen} phase=${phase} onStart=${() => setView('code-eingabe')} />`}
      ${view === 'code-eingabe' && html`<${CodeEingabe} phase=${phase} code=${code} setCode=${setCode} error=${codeError} onSubmit=${() => handleCodeSubmit(null)} onBack=${reset} />`}
      ${view === 'bestaetigung' && html`<${Bestaetigung} schueler=${schueler} onBestaetigen=${() => setView('wahl')} onZurueck=${reset} />`}
      ${view === 'wahl' && html`<${ProjektWahl} schueler=${schueler} projekte=${passendeProjekte} wahlen=${wahlen} getWahlNr=${getWahlNr} onProjektClick=${handleProjektClick} onAbsenden=${absendenWahl} alleDrei=${alleDrei} anzahl=${anzahl} setWahlen=${setWahlen} submitting=${submitting} submitError=${submitError} />`}
      ${view === 'fertig-angemeldet' && html`<${FertigAngemeldet} schueler=${schueler} wahlen=${wahlen} projekte=${projekteAll} onClose=${reset} />`}
      ${view === 'bereits-angemeldet' && html`<${BereitsAngemeldet} schueler=${schueler} projekte=${projekteAll} onClose=${reset} />`}
      ${view === 'verteilung-laeuft' && html`<${VerteilungLaeuft} schueler=${schueler} onClose=${reset} />`}
      ${view === 'mein-ergebnis' && html`<${MeinErgebnis} schueler=${schueler} projekte=${projekteAll} onTausch=${() => setView('tauschwunsch')} onClose=${reset} phase=${phase} />`}
      ${view === 'warten-auf-verteilung' && html`<${WartenAufVerteilung} schueler=${schueler} onClose=${reset} />`}
      ${view === 'nicht-angemeldet' && html`<${NichtAngemeldet} onClose=${reset} />`}
      ${view === 'tauschwunsch' && html`<${TauschwunschFormular} service=${service} schueler=${schueler} projekte=${projekteAll} onFertig=${() => setView('tauschwunsch-abgeschickt')} onBack=${() => setView('mein-ergebnis')} />`}
      ${view === 'tauschwunsch-abgeschickt' && html`<${TauschwunschAbgeschickt} onClose=${reset} />`}
    </div>
    
    <footer>
      Bei Fragen: <a href="mailto:kotzan@realschule-schriesheim.de">kotzan@realschule-schriesheim.de</a><br/>
      <a href="https://realschule-schriesheim.de/datenschutzerklaerung/">Datenschutz</a>
      <span class="divider">·</span>
      <a href="https://realschule-schriesheim.de/kontakt-service/impressum-3/">Impressum</a>
    </footer>
  `;
}

// === CODE-EINGABE ===
function CodeEingabe({ phase, code, setCode, error, onSubmit, onBack }) {
  const titel = {
    anmeldung: 'Dein Anmelde-Code',
    verteilung: 'Dein Code',
    nachbearbeitung: 'Dein Code',
    projekttage: 'Dein Code'
  }[phase] || 'Dein Code';
  
  return html`
    <div class="card">
      <h1>${titel}</h1>
      <p>Gib deinen persönlichen Code aus dem Brief ein.</p>
      
      <div class="input-group" style="margin-top:20px;">
        <label for="code-input">Anmelde-Code</label>
        <input id="code-input" type="text" class=${error ? 'error' : ''} value=${code}
          onInput=${e => setCode(e.target.value.toUpperCase())} placeholder="z.B. 7B-A7K2"
          autocomplete="off" autocapitalize="characters" spellcheck="false" />
        <div class="input-hint">8 Zeichen mit Bindestrich in der Mitte</div>
      </div>
      
      ${error && html`<div class="alert alert-error">❗ ${error}</div>`}
      
      <div class="actions">
        <button class="btn btn-ghost" onClick=${onBack}>← Zurück</button>
        <button class="btn btn-primary" onClick=${onSubmit} disabled=${!code || code.length < 4}>Weiter →</button>
      </div>
      
      <div style="margin-top:20px;padding-top:20px;border-top:1px dashed var(--border);font-size:12px;color:var(--text-muted);">
        <strong>🧪 Demo-Codes:</strong>
        <span class="code-hint">7B-A7K2</span>
        <span class="code-hint">5A-B3X9</span>
        <span class="code-hint">9C-K7M2</span>
        <span class="code-hint">8A-T4P1</span>
      </div>
    </div>
  `;
}

// === PROJEKTWAHL ===
function ProjektWahl({ schueler, projekte, wahlen, getWahlNr, onProjektClick, onAbsenden, alleDrei, anzahl, setWahlen, submitting, submitError }) {
  const map = useMemo(() => { const m = {}; projekte.forEach(p => m[p.id] = p); return m; }, [projekte]);
  const label = (id) => id ? (map[id]?.titel || '—') : '—';
  
  return html`
    <div class="status-bar">
      <div class="status-greet">Hallo <strong>${schueler.vorname}</strong>! Wähle deine drei Wunsch-Projekte:</div>
      <div class="status-wahlen">
        <div class=${"status-wahl " + (wahlen.w1 ? "filled w1" : "")}>
          <strong>1. Wahl</strong><div class="status-wahl-titel">${label(wahlen.w1)}</div>
        </div>
        <div class=${"status-wahl " + (wahlen.w2 ? "filled w2" : "")}>
          <strong>2. Wahl</strong><div class="status-wahl-titel">${label(wahlen.w2)}</div>
        </div>
        <div class=${"status-wahl " + (wahlen.w3 ? "filled w3" : "")}>
          <strong>3. Wahl</strong><div class="status-wahl-titel">${label(wahlen.w3)}</div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="stepper">
        <div class="step done">✓</div><div class="step-line done"></div>
        <div class="step done">✓</div><div class="step-line done"></div>
        <div class="step active">3</div>
      </div>
      <h2>Deine Wunsch-Projekte 🎯</h2>
      <p>Tippe ein Projekt an. Dein erster Tipp wird <strong style="color:var(--krs-blau)">1. Wahl</strong>, dein zweiter <strong style="color:var(--krs-orange)">2. Wahl</strong>, dein dritter <strong style="color:var(--krs-gelb-dark)">3. Wahl</strong>.</p>
      <div class="projekt-grid">
        ${projekte.map(p => {
          const nr = getWahlNr(p.id);
          const cls = nr === 1 ? 'selected-1' : nr === 2 ? 'selected-2' : nr === 3 ? 'selected-3' : '';
          return html`
            <div class=${"projekt-card " + cls} onClick=${() => onProjektClick(p.id)}>
              ${nr > 0 && html`<div class="wahl-badge">${nr}</div>`}
              <div class="projekt-titel">${p.titel}</div>
              <div class="projekt-beschreibung">${p.beschreibung}</div>
              <div class="projekt-klassen">Klassen ${p.min_klasse}–${p.max_klasse}</div>
            </div>
          `;
        })}
      </div>
      ${submitError && html`<div class="alert alert-error">❗ ${submitError}</div>`}
      <div class="actions">
        <button class="btn btn-ghost" onClick=${() => setWahlen({ w1: null, w2: null, w3: null })} disabled=${submitting}>🗑️ Zurücksetzen</button>
        <button class=${alleDrei ? "btn btn-accent" : "btn btn-primary"} disabled=${!alleDrei || submitting} onClick=${onAbsenden}>
          ${submitting ? 'Sende …' : (alleDrei ? '✓ Absenden' : `Noch ${3 - anzahl} ${3-anzahl === 1 ? 'Wahl' : 'Wahlen'}`)}
        </button>
      </div>
    </div>
  `;
}

// === FERTIG ANGEMELDET ===
function FertigAngemeldet({ schueler, wahlen, projekte, onClose }) {

  const now = new Date().toLocaleString('de-DE', { dateStyle: 'long', timeStyle: 'short' });
  
  return html`
    <div class="card text-center">
      <div class="stepper">
        <div class="step done">✓</div><div class="step-line done"></div>
        <div class="step done">✓</div><div class="step-line done"></div>
        <div class="step done">✓</div>
      </div>
      <div class="emoji-large">🎉</div>
      <h2 style="margin:0 0 8px;">Super, ${schueler.vorname}!</h2>
      <p>Deine Anmeldung wurde gespeichert.</p>
      <div class="alert alert-success" style="text-align:left;margin-top:20px;">
        <strong>✓ Erfolgreich angemeldet</strong><br/>
        ${schueler.vorname} ${schueler.nachname} · Klasse ${schueler.klasse}<br/>
        <small style="opacity:0.8;">Code: ${schueler.code} · ${now}</small>
      </div>
    </div>
    <div class="card">
      <h3 style="margin-top:0;">Deine Wahl-Reihenfolge</h3>
      ${[1, 2, 3].map(n => {
        const wid = wahlen['w' + n];
        const p = map[wid];
        return html`
          <div class=${"projekt-card selected-" + n} style="margin-bottom:12px;cursor:default;">
            <div class="wahl-badge">${n}</div>
            <div class="projekt-titel">${p?.titel}</div>
          </div>
        `;
      })}
      <div class="alert alert-info" style="margin-top:20px;">
        <strong>📅 Wie geht es weiter?</strong><br/>
        Sobald alle Schüler gewählt haben, teilen wir die Projekte ein. Du erfährst dein zugeteiltes Projekt rechtzeitig über deinen Klassenlehrer — und kannst es auch hier jederzeit nachschauen.
      </div>
      <div class="actions">
        <button class="btn btn-ghost" onClick=${onClose}>Zur Startseite</button>
        <button class="btn btn-secondary" onClick=${() => window.print()}>🖨️ Drucken</button>
      </div>
    </div>
  `;
}

// === MEIN ERGEBNIS ===
function MeinErgebnis({ schueler, projekte, onTausch, onClose, phase }) {
  const zuteilung = schueler.status.zuteilung;
  const projekt = projekte.find(p => p.id === zuteilung.projekt_id);
  const wahlNr = zuteilung.wahl_nr;
  
  const wahlLabel = {
    1: { text: '1. Wahl 🎯', color: 'wahl-1', message: 'Das war deine Erstwahl — super!' },
    2: { text: '2. Wahl', color: 'wahl-2', message: 'Das war deine Zweitwahl.' },
    3: { text: '3. Wahl', color: 'wahl-3', message: 'Das war deine Drittwahl.' }
  }[wahlNr] || { text: 'Zuteilung', color: 'wahl-none', message: 'Wurde manuell zugeteilt.' };
  
  return html`
    <div class="card">
      <h2>Hallo ${schueler.vorname}! 👋</h2>
      <p>Hier ist dein Ergebnis für die Projekttage:</p>
    </div>
    <div class=${"ergebnis-box " + wahlLabel.color}>
      <div class="ergebnis-wahl-label">${wahlLabel.text}</div>
      <div class="ergebnis-projekt-titel">${projekt.titel}</div>
      <div class="ergebnis-lehrer">${projekt.ort}</div>
      <div class="ergebnis-beschreibung">${projekt.beschreibung}</div>
    </div>
    <div class="card">
      ${wahlNr === 1 ? html`
        <div class="alert alert-success">
          🎉 <strong>Glückwunsch!</strong> Du hast deine Erstwahl bekommen.
        </div>
      ` : html`
        <div class="alert alert-info">
          <strong>${wahlLabel.message}</strong><br/>
          Wenn du lieber in einem anderen Projekt wärst, kannst du einen Tauschwunsch stellen.
        </div>
      `}
      
      ${phase === 'projekttage' ? html`
        <div class="alert alert-warning">
          <strong>📅 Projekttage-Infos</strong><br/>
          Treffpunkt: ${projekt.ort}<br/>
          Zeit: Montag 21. Juli, 8:00 Uhr<br/>
          Materialien: Frag deinen Klassenlehrer
        </div>
      ` : html`
        <div class="actions">
          ${wahlNr !== 1 && html`<button class="btn btn-accent" onClick=${onTausch}>🔄 Tauschwunsch stellen</button>`}
          <button class="btn btn-ghost" onClick=${onClose}>Zur Startseite</button>
        </div>
      `}
    </div>
  `;
}

// === TAUSCHWUNSCH ===
function TauschwunschFormular({ service, schueler, projekte, onFertig, onBack }) {
  const [nachProjekt, setNachProjekt] = useState('');
  const [begruendung, setBegruendung] = useState('');
  const [error, setError] = useState('');
  const [sending, setSending] = useState(false);

  const aktuelles = projekte.find(p => p.id === schueler.status.zuteilung.projekt_id);
  const verfuegbar = projekte.filter(p =>
    aktuelles && p.id !== aktuelles.id &&
    schueler.klassenstufe >= p.min_klasse &&
    schueler.klassenstufe <= p.max_klasse
  );

  const absenden = async () => {
    if (!nachProjekt) { setError('Bitte wähle ein Ziel-Projekt aus.'); return; }
    if (begruendung.trim().length < 10) { setError('Bitte schreibe eine kurze Begründung (mindestens 10 Zeichen).'); return; }
    setSending(true);
    setError('');
    try {
      const res = await service.createTauschwunsch({
        code: schueler.code,
        vorname: schueler.vorname,
        nachname: schueler.nachname,
        nach_projekt_id: nachProjekt,
        begruendung: begruendung.trim(),
      });
      if (!res || !res.success) {
        const code = (res && res.error) || 'unbekannt';
        const msg = {
          keine_zuteilung: 'Für dich liegt noch keine Zuteilung vor.',
          schon_offener_wunsch: 'Du hast bereits einen offenen Tauschwunsch.',
          name_stimmt_nicht: 'Name und Code passen nicht zusammen.',
          gleiches_projekt: 'Das ist dein aktuelles Projekt — bitte wähle ein anderes.',
          begruendung_zu_kurz: 'Die Begründung ist zu kurz (mindestens 10 Zeichen).',
        }[code] || 'Es gab ein Problem. Bitte später erneut versuchen.';
        setError(msg);
        return;
      }
      onFertig();
    } catch (e) {
      console.error('[KRS] Tauschwunsch absenden:', e);
      setError('Keine Verbindung zum Server. Bitte gleich nochmal probieren.');
    } finally {
      setSending(false);
    }
  };
  
  return html`
    <div class="card">
      <h2>🔄 Tauschwunsch stellen</h2>
      <p>
        Du bist aktuell in <strong>${aktuelles.titel}</strong>. 
        Wohin möchtest du wechseln?
      </p>
      
      <div class="input-group">
        <label>In welches Projekt?</label>
        <select value=${nachProjekt} onChange=${e => setNachProjekt(e.target.value)}>
          <option value="">— bitte wählen —</option>
          ${verfuegbar.map(p => html`
            <option value=${p.id}>
              ${p.titel}${typeof p.freie_plaetze === 'number' ? ` (${p.freie_plaetze > 0 ? p.freie_plaetze + ' Plätze frei' : 'voll — Tauschpartner gesucht'})` : ''}
            </option>
          `)}
        </select>
      </div>
      
      <div class="input-group">
        <label>Warum möchtest du wechseln?</label>
        <textarea value=${begruendung} onInput=${e => setBegruendung(e.target.value)} 
          placeholder="Zum Beispiel: Ich interessiere mich viel mehr für..."></textarea>
        <div class="input-hint">Mindestens 10 Zeichen. Eine gute Begründung hilft bei der Entscheidung.</div>
      </div>
      
      ${error && html`<div class="alert alert-error">❗ ${error}</div>`}
      
      <div class="alert alert-info">
        <strong>ℹ️ Wichtig:</strong> Dein Wunsch wird von der Projektleitung geprüft. Du erhältst über deinen Klassenlehrer Bescheid.
      </div>
      
      <div class="actions">
        <button class="btn btn-ghost" onClick=${onBack} disabled=${sending}>← Zurück</button>
        <button class="btn btn-primary" onClick=${absenden} disabled=${sending}>${sending ? 'Sende …' : 'Wunsch senden'}</button>
      </div>
    </div>
  `;
}
