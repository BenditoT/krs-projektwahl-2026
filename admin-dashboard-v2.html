                    max_plaetze: formData.max_plaetze ?? 0,
                    min_klasse: formData.min_klasse ?? 5,
                    max_klasse: formData.max_klasse ?? 9,
                  };
                  if (editingId === 'new') {
                    await svc.createProjekt(payload);
                    showToast('Projekt erstellt!', 'success');
                  } else {
                    await svc.updateProjekt(editingId, payload);
                    showToast('Projekt aktualisiert!', 'success');
                  }
                } else {
                  if (editingId === 'new') {
                    mockProjekteData.push(formData);
                    showToast('Projekt erstellt!', 'success');
                  } else {
                    const idx = mockProjekteData.findIndex(p => p.id === editingId);
                    if (idx >= 0) mockProjekteData[idx] = formData;
                    showToast('Projekt aktualisiert!', 'success');
                  }
                }
                // v22: nach DB-Write in Produktiv-Modus zentralen loadAll() triggern,
                // damit mockProjekteData synchron aktualisiert wird (Realtime ist nur Fallback).
                if (window.KRS_MODE === 'produktiv' && typeof loadAll === 'function') await loadAll();
              } catch (err) {
                showToast('Fehler: ' + err.message, 'error');
                return;
              }
              setModal(null);
              setFormData(null);
              setEditingId(null);
            }}>Speichern</button>
          </div>
        </div>
      </div>
    `);
  }, [formData, editingId]);

  // v25: Bulk-Aktion — alle Entwürfe in einem Schwung veröffentlichen
  const entwurfsCount = mockProjekteData.filter(p => p.status === 'entwurf').length;
  const handleBulkVeroeffentlichen = async () => {
    const entwuerfe = mockProjekteData.filter(p => p.status === 'entwurf');
    if (!entwuerfe.length) { showToast('Keine Entwürfe zu veröffentlichen.', 'info'); return; }
    if (!window.confirm(entwuerfe.length + ' Entwurf-Projekte veröffentlichen?')) return;
    let ok = 0, fehler = 0;
    try {
      if (window.KRS_MODE === 'produktiv') {
        const svc = new window.KrsDataService();
        for (const p of entwuerfe) {
          try { await svc.updateProjekt(p.id, { status: 'veroeffentlicht' }); ok++; }
          catch (err) { console.warn('[bulk-veröffentlichen]', p.id, err); fehler++; }
        }
        if (typeof loadAll === 'function') await loadAll();
      } else {
        entwuerfe.forEach(p => { p.status = 'veroeffentlicht'; ok++; });
      }
      if (fehler === 0) showToast(ok + ' Projekte veröffentlicht ✓', 'success');
      else showToast(ok + ' veröffentlicht, ' + fehler + ' Fehler — Konsole prüfen.', 'error');
    } catch (err) {
      showToast('Bulk-Aktion fehlgeschlagen: ' + err.message, 'error');
    }
  };

  // v25: Inline-Status-Toggle pro Zeile (ohne Modal-Öffnen)
  const handleStatusToggle = async (p) => {
    const newStatus = p.status === 'veroeffentlicht' ? 'entwurf' : 'veroeffentlicht';
    if (!window.confirm('Status von „' + (p.titel || 'Projekt') + '" auf „' + newStatus + '" setzen?')) return;
    try {
      if (window.KRS_MODE === 'produktiv') {
        await (new window.KrsDataService()).updateProjekt(p.id, { status: newStatus });
        if (typeof loadAll === 'function') await loadAll();
      } else {
        p.status = newStatus;
      }
      showToast('Status: ' + newStatus, 'success');
    } catch (err) {
      showToast('Fehler: ' + err.message, 'error');
    }
  };

  return html`
    <div class="main-header">
      <div>
        <h1 class="main-title">Projekte</h1>
        <div class="main-subtitle">${mockProjekteData.length} Projekte angelegt${entwurfsCount ? ' · ' + entwurfsCount + ' Entwürfe' : ''}</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        ${entwurfsCount > 0 ? html`
          <button class="btn btn-secondary" onClick=${handleBulkVeroeffentlichen}
                  title="Alle Projekte mit Status „entwurf" auf „veröffentlicht" setzen">
            📢 Alle Entwürfe veröffentlichen (${entwurfsCount})
          </button>
        ` : ''}
        <button class="btn btn-primary" onClick=${openCreateModal}>➕ Neues Projekt</button>
      </div>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th style="width:64px;">Bild</th>
            <th>Titel</th>
            <th>Lehrer</th>
            <th>Plätze</th>
            <th>Klassenstufen</th>
            <th>Wünsche (1./2./3.)</th>
            <th>Status</th>
            <th>Aktionen</th>
          </tr>
        </thead>
        <tbody>
          ${mockProjekteData.length === 0 ? html`
            <tr><td colspan="8">
              <div class="empty-state">
                <span class="empty-emoji">📋</span>
                <div class="empty-title">Noch keine Projekte angelegt</div>
                <div class="empty-hint">Klicke oben auf "➕ Neues Projekt", um das erste Projekt anzulegen.</div>
              </div>
            </td></tr>
          ` : mockProjekteData.map(p => {
            const ausgelastet = p.belegt >= p.max_plaetze;
            const ueberbucht = p.erstwahl_wuensche > p.max_plaetze;
            const lehrer = mockLehrerData.find(l => l.id === p.lehrer_id);
            return html`
              <tr key=${p.id}>
                <td>
                  ${p.bild_url ? html`
                    <img src=${p.bild_url} alt="" style="width:48px;height:48px;object-fit:cover;border-radius:4px;border:1px solid var(--border-color, #D0D7DE);" />
                  ` : html`
                    <div style="width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:#F6F7F9;border-radius:4px;border:1px dashed #D0D7DE;color:#8B97A2;font-size:1.1rem;">📷</div>
                  `}
                </td>
                <td><strong>${p.titel}</strong><br/><small style="color:var(--text-muted);">${p.kurzbeschreibung}</small></td>
                <td>${lehrer?.name || p.lehrer}</td>
                <td>
                  ${p.belegt}/${p.max_plaetze}
                  ${ausgelastet ? html`<span class="pill pill-success" style="margin-left:4px;">voll</span>` : ''}
                </td>
                <td>${p.min_klasse}-${p.max_klasse}</td>
                <td>
                  <span class="pill pill-wahl-1">${p.erstwahl_wuensche}</span>
                  <span class="pill pill-wahl-2">${p.zweitwahl_wuensche}</span>
                  <span class="pill pill-wahl-3">${p.drittwahl_wuensche}</span>
                  ${ueberbucht ? html`<br/><small style="color:var(--krs-orange);">⚠️ überbucht</small>` : ''}
                </td>
                <td>
                  <span class=${"pill " + (p.status === 'veroeffentlicht' ? 'pill-success' : 'pill-info')}
                        style="cursor:pointer;user-select:none;"
                        title=${"Klicken: Status umschalten — aktuell „" + (p.status || 'entwurf') + "\""}
                        onClick=${(e) => { e.stopPropagation(); handleStatusToggle(p); }}>
                    ${p.status || 'entwurf'} ${p.status === 'veroeffentlicht' ? '✓' : '↻'}
                  </span>
                </td>
                <td class="actions-cell">
                  <button class="btn btn-ghost btn-small" onClick=${() => openEditModal(p)}>✏️ Bearbeiten</button>
                </td>
              </tr>
            `;
          })}
        </tbody>
      </table>
    </div>
  `;
}

// === MEIN PROJEKT (Projektlehrer-Self-Service, v25) ===
// Reduzierte Edit-Maske für Rolle 'projektlehrer'. Backend-Trigger
// (enforce_projektlehrer_whitelist) erzwingt Spalten-Whitelist serverseitig —
// hier im Frontend bilden wir das ab, damit die UX sauber bleibt.
//
// Eigene Projekte = mockProjekteData.filter(p => p.lehrer_id === currentDbUserId)
// Anlegen nur in setup/anmeldung-Phase. Trigger erzwingt status='entwurf'.
function ProjektLehrerView({ setModal, refreshKey, loadAll, phase, currentDbUserId }) {
  const [editingId, setEditingId] = useState(null);
  const [formData, setFormData] = useState(null);

  // Demo-Fallback: wenn kein dbUserId (Demo-Modus), nehmen wir den ersten projektlehrer
  // aus mockLehrerData — damit die View überhaupt etwas anzuzeigen hat.
  const effectiveOwnerId = currentDbUserId
    || (window.KRS_MODE !== 'produktiv'
        ? (mockLehrerData.find(l => l.rolle === 'projektlehrer') || {}).id
        : null);

  const ownProjekte = (mockProjekteData || []).filter(p => p.lehrer_id === effectiveOwnerId);

  const canCreate = phase === 'setup' || phase === 'anmeldung';

  const closeModal = () => { setModal(null); setFormData(null); setEditingId(null); };

  const openCreateModal = () => {
    setFormData({
      id: 'p_neu_' + Date.now(),
      titel: '',
      kurzbeschreibung: '',
      langbeschreibung: '',
      ort: '',
      lehrer_id: effectiveOwnerId,
      // Pflichtfelder für Schema; Trigger erzwingt status='entwurf' beim INSERT,
      // egal was wir hier mitgeben. Defaults aus Schema.
      min_teilnehmer: 6,
      max_plaetze: 12,
      min_klasse: 5,
      max_klasse: 9,
      status: 'entwurf',
      bild_url: null,
    });
    setEditingId('new');
  };

  const openEditModal = (projekt) => {
    // Defensive Schicht (RLS + Trigger sind die echte Schutzgrenze, das hier ist UX):
    // Wenn die Liste aus irgendwelchen Gründen ein Fremd-Projekt enthielte,
    // verweigern wir das Öffnen client-seitig und zeigen einen Toast.
    if (effectiveOwnerId && projekt.lehrer_id !== effectiveOwnerId) {
      showToast('Du kannst nur eigene Projekte bearbeiten.', 'error');
      return;
    }
    setFormData({...projekt});
    setEditingId(projekt.id);
  };

  useEffect(() => {
    if (!formData || !editingId) { setModal(null); return; }
    setModal(html`
      <div class="modal-overlay" onClick=${closeModal}>
        <div class="modal-content" onClick=${e => e.stopPropagation()}>
          <button class="modal-close" onClick=${closeModal} aria-label="Schließen" title="Schließen (ESC)">×</button>
          <h2>${editingId === 'new' ? '➕ Neues Projekt anlegen' : '✏️ Projekt bearbeiten'}</h2>
          <p style="color:#6C7A87;font-size:0.85rem;margin:-4px 0 14px;">
            ${editingId === 'new'
              ? 'Dein Entwurf wird gespeichert — die Projektleitung gibt ihn anschließend frei.'
              : 'Du kannst Titel, Beschreibung, Ort und Bild ändern. Plätze, Klassenstufen und Status pflegt die Projektleitung.'}
          </p>
          <div class="input-group">
            <label>Titel *</label>
            <input type="text" value=${formData?.titel || ''}
              onInput=${e => setFormData({...formData, titel: e.target.value})} />
          </div>
          <div class="input-group">
            <label>Kurzbeschreibung *</label>
            <textarea maxlength="300" value=${formData?.kurzbeschreibung || ''}
              onInput=${e => setFormData({...formData, kurzbeschreibung: e.target.value})}></textarea>
            <small style="color:#8B97A2;">max. 300 Zeichen — wird in der Schüler-Übersicht angezeigt.</small>
          </div>
          <div class="input-group">
            <label>Langbeschreibung (optional)</label>
            <textarea value=${formData?.langbeschreibung || ''}
              onInput=${e => setFormData({...formData, langbeschreibung: e.target.value})}></textarea>
          </div>
          <div class="input-group">
            <label>Ort (optional)</label>
            <input type="text" value=${formData?.ort || ''}
              onInput=${e => setFormData({...formData, ort: e.target.value})} />
          </div>
          ${editingId !== 'new' && html`
            <div style="background:#F6F7F9;border-radius:6px;padding:10px 12px;margin-top:10px;font-size:0.85rem;color:#6C7A87;line-height:1.5;">
              <strong style="color:#4A6A83;">Festgelegt von der Projektleitung</strong><br/>
              Plätze: ${formData?.min_teilnehmer || '?'}–${formData?.max_plaetze || '?'} ·
              Klassen: ${formData?.min_klasse || '?'}–${formData?.max_klasse || '?'} ·
              Status: <strong>${formData?.status || 'entwurf'}</strong>
            </div>
          `}
          <!-- Bild-Upload -->
          <div class="input-group" style="margin-top:14px;">
            <label>Projekt-Bild (optional, max. 5 MB)</label>
            ${editingId === 'new' ? html`
              <div style="padding:10px;background:#FAFBFC;border:1px dashed #D0D7DE;border-radius:6px;color:#6C7A87;font-size:0.85rem;">
                💡 Speichere den Entwurf zuerst — danach kannst du ein Bild hochladen.
              </div>
            ` : html`
              <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
                ${formData?.bild_url ? html`
                  <img src=${formData.bild_url} alt="Projekt-Bild"
                    style="width:120px;height:80px;object-fit:cover;border-radius:6px;border:1px solid #D0D7DE;" />
                ` : html`
                  <div style="width:120px;height:80px;display:flex;align-items:center;justify-content:center;background:#F6F7F9;border:1px dashed #D0D7DE;border-radius:6px;color:#8B97A2;font-size:0.8rem;">Kein Bild</div>
                `}
                <div style="display:flex;flex-direction:column;gap:6px;">
                  <input type="file" accept="image/jpeg,image/png,image/webp,image/gif" id="projektLehrerBildInput" style="display:none;"
                    onChange=${async (e) => {
                      const file = e.target.files && e.target.files[0];
                      if (!file) return;
                      if (file.size > 5 * 1024 * 1024) { showToast('Bild ist größer als 5 MB.', 'error'); return; }
                      try {
                        showToast('Bild wird hochgeladen…', 'info');
                        const svc = new window.KrsDataService();
                        const { url } = await svc.uploadProjektBild(editingId, file);
                        setFormData({...formData, bild_url: url});
                        if (typeof loadAll === 'function') await loadAll();
                        showToast('Bild hochgeladen ✓', 'success');
                      } catch (err) {
                        showToast('Fehler: ' + err.message, 'error');
                      } finally {
                        e.target.value = '';
                      }
                    }} />
                  <button type="button" class="btn btn-ghost" style="padding:6px 12px;font-size:0.85rem;"
                    onClick=${() => document.getElementById('projektLehrerBildInput')?.click()}>
                    ${formData?.bild_url ? '🔄 Bild ersetzen' : '📷 Bild hochladen'}
                  </button>
                  ${formData?.bild_url ? html`
                    <button type="button" class="btn btn-danger" style="padding:6px 12px;font-size:0.85rem;"
                      onClick=${async () => {
                        if (!window.confirm('Bild wirklich entfernen?')) return;
                        try {
                          const svc = new window.KrsDataService();
                          await svc.deleteProjektBild(editingId);
                          setFormData({...formData, bild_url: null});
                          if (typeof loadAll === 'function') await loadAll();
                          showToast('Bild entfernt', 'success');
                        } catch (err) {
                          showToast('Fehler: ' + err.message, 'error');
                        }
                      }}>🗑 Entfernen</button>
                  ` : ''}
                </div>
              </div>
            `}
          </div>
          <div class="btn-group" style="margin-top:20px;">
            <button class="btn btn-ghost" onClick=${closeModal}>Abbrechen</button>
            <button class="btn btn-success" onClick=${async () => {
              if (!formData.titel || !(formData.kurzbeschreibung || '').trim()) {
                showToast('Titel und Kurzbeschreibung sind erforderlich.', 'error');
                return;
              }
              if ((formData.kurzbeschreibung || '').length > 300) {
                showToast('Kurzbeschreibung darf max. 300 Zeichen lang sein.', 'error');
                return;
              }
              try {
                if (window.KRS_MODE === 'produktiv') {
                  const svc = new window.KrsDataService();
                  if (editingId === 'new') {
                    // Backend-Trigger setzt status='entwurf' & lehrer_id=self.
                    // Wir senden trotzdem konsistente Werte mit, falls der Trigger
                    // (z.B. bei super_admin-Maintenance) nicht greift.
                    const payload = {
                      titel: formData.titel,
                      kurzbeschreibung: formData.kurzbeschreibung,
                      langbeschreibung: formData.langbeschreibung || null,
                      ort: formData.ort || null,
                      lehrer_id: effectiveOwnerId,
                      min_teilnehmer: formData.min_teilnehmer ?? 6,
                      max_plaetze: formData.max_plaetze ?? 12,
                      min_klasse: formData.min_klasse ?? 5,
                      max_klasse: formData.max_klasse ?? 9,
                      status: 'entwurf',
                    };
                    await svc.createProjekt(payload);
                    showToast('Projekt-Entwurf gespeichert!', 'success');
                  } else {
                    // Whitelist: Backend-Trigger blockt alles andere.
                    const payload = {
                      titel: formData.titel,
                      kurzbeschreibung: formData.kurzbeschreibung,
                      langbeschreibung: formData.langbeschreibung || null,
                      ort: formData.ort || null,
                    };
                    await svc.updateProjekt(editingId, payload);
                    showToast('Projekt aktualisiert!', 'success');
                  }
                } else {
                  // Demo-Modus: Mock-Array direkt mutieren
                  if (editingId === 'new') {
                    mockProjekteData.push({
                      ...formData,
                      lehrer_id: effectiveOwnerId,
                      status: 'entwurf',
                    });
                    showToast('Projekt-Entwurf gespeichert! (Demo)', 'success');
                  } else {
                    const idx = mockProjekteData.findIndex(p => p.id === editingId);
                    if (idx >= 0) {
                      // Whitelist analog Backend
                      mockProjekteData[idx] = {
                        ...mockProjekteData[idx],
                        titel: formData.titel,
                        kurzbeschreibung: formData.kurzbeschreibung,
                        langbeschreibung: formData.langbeschreibung,
                        ort: formData.ort,
                        bild_url: formData.bild_url,
                      };
                    }
                    showToast('Projekt aktualisiert! (Demo)', 'success');
                  }
                }
                if (window.KRS_MODE === 'produktiv' && typeof loadAll === 'function') await loadAll();
              } catch (err) {
                showToast('Fehler: ' + err.message, 'error');
                return;
              }
              closeModal();
            }}>Speichern</button>
          </div>
        </div>
      </div>
    `);
  }, [formData, editingId]);

  return html`
    <div class="main-header">
      <div>
        <h1 class="main-title">📚 Mein Projekt</h1>
        <div class="main-subtitle">${ownProjekte.length === 1 ? '1 eigenes Projekt' : ownProjekte.length + ' eigene Projekte'}</div>
      </div>
      ${canCreate ? html`<button class="btn btn-primary" onClick=${openCreateModal}>➕ Neues Projekt</button>` : ''}
    </div>

    ${ownProjekte.length === 0 ? html`
      <div class="empty-state" style="padding:40px;text-align:center;">
        <span class="empty-emoji" style="font-size:2.5rem;">📚</span>
        <div class="empty-title" style="font-weight:600;margin-top:8px;">Du hast noch kein Projekt angelegt</div>
        <div class="empty-hint" style="color:#6C7A87;margin-top:4px;">${canCreate
          ? 'Klicke oben auf „➕ Neues Projekt", um deinen Entwurf anzulegen.'
          : 'In der aktuellen Phase können keine neuen Projekte mehr angelegt werden. Sprich mit der Projektleitung, falls du noch eines brauchst.'}</div>
      </div>
    ` : html`
      <div data-section="mein-projekt-cards"
           style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-top:8px;">
        ${ownProjekte.map(p => html`
          <div class="card" style="padding:14px;border:1px solid #D0D7DE;border-radius:8px;background:#fff;">
            ${p.bild_url
              ? html`<img src=${p.bild_url} alt="" style="width:100%;height:140px;object-fit:cover;border-radius:6px;margin-bottom:10px;" />`
              : html`<div style="width:100%;height:140px;display:flex;align-items:center;justify-content:center;background:#F6F7F9;border-radius:6px;margin-bottom:10px;color:#8B97A2;font-size:1.5rem;">📷</div>`}
            <h3 style="margin:0 0 4px;font-size:1.05rem;line-height:1.3;">${p.titel || '(ohne Titel)'}</h3>
            <p style="margin:0 0 10px;color:#6C7A87;font-size:0.85rem;min-height:34px;">${p.kurzbeschreibung || ''}</p>
            <div style="display:flex;gap:6px;flex-wrap:wrap;font-size:0.75rem;color:#6C7A87;align-items:center;">
              <span class=${"pill " + (p.status === 'veroeffentlicht' ? 'pill-success' : 'pill-info')}>${p.status || 'entwurf'}</span>
              ${p.ort ? html`<span>📍 ${p.ort}</span>` : ''}
              <span>👥 ${p.min_teilnehmer || '?'}–${p.max_plaetze || '?'}</span>
              <span>🎓 ${p.min_klasse || '?'}–${p.max_klasse || '?'}</span>
            </div>
            <button class="btn btn-ghost btn-small" style="margin-top:12px;width:100%;" onClick=${() => openEditModal(p)}>✏️ Bearbeiten</button>
          </div>
        `)}
      </div>
    `}
  `;
}

// === LEHRER ===
// v21: Modal-Fix analog ProjekteView — showModal() entfernt.
// Stattdessen useEffect([formData, editingId]), damit das Modal bei jedem
// State-Change neu in den globalen Modal-Slot geschrieben wird (Prefill zieht,
// Live-Eingaben werden reflected). Alter Bug: showModal() wurde synchron nach
// setFormData() gerufen und las die stale Closure → Formular blieb leer.
function LehrerView({ setModal, refreshKey, loadAll }) {
  const [editingId, setEditingId] = useState(null);
  const [formData, setFormData] = useState(null);

  const closeModal = () => { setModal(null); setFormData(null); setEditingId(null); };

  const openCreateModal = () => {
    setFormData({
      id: 'u' + (mockLehrerData.length + 1),
      name: '',
      email: '',
      rolle: 'projektlehrer',
      klassenlehrer_von: ''
    });
    setEditingId('new');
  };

  const openEditModal = (lehrer) => {
    setFormData({...lehrer});
    setEditingId(lehrer.id);
  };

  useEffect(() => {
    if (!formData || !editingId) { setModal(null); return; }
    setModal(html`
      <div class="modal-overlay" onClick=${closeModal}>
        <div class="modal-content" onClick=${e => e.stopPropagation()}>
          <button class="modal-close" onClick=${closeModal} aria-label="Schließen" title="Schließen (ESC)">×</button>
          <h2>${editingId === 'new' ? '➕ Lehrer einladen' : '✏️ Lehrer bearbeiten'}</h2>
          <div class="input-group">
            <label>Name *</label>
            <input type="text" value=${formData?.name || ''} onInput=${e => setFormData({...formData, name: e.target.value})} />
          </div>
          <div class="input-group">
            <label>E-Mail *</label>
            <input type="email" value=${formData?.email || ''} onInput=${e => setFormData({...formData, email: e.target.value})} />
          </div>
          <div class="input-group">
            <label>Rolle</label>
            <select value=${formData?.rolle || 'projektlehrer'} onChange=${e => setFormData({...formData, rolle: e.target.value})}>
              <option value="projektlehrer">Projektlehrer</option>
              <option value="klassenlehrer">Klassenlehrer</option>
              <option value="projektleitung">Projektleitung</option>
            </select>
          </div>
          <div class="input-group">
            <label>Klassenlehrer von (z.B. 7a)</label>
            <input type="text" value=${formData?.klassenlehrer_von || ''} onInput=${e => setFormData({...formData, klassenlehrer_von: e.target.value})} placeholder="Optional" />
          </div>
          <div class="btn-group" style="margin-top:20px;">
            <button class="btn btn-ghost" onClick=${() => { setModal(null); setFormData(null); setEditingId(null); }}>Abbrechen</button>
            ${editingId !== 'new' && editingId !== 'u1' && html`
              <button class="btn btn-danger" onClick=${async () => {
                const name = formData?.name || 'diesen Lehrer';
                if (!window.confirm(`Lehrer "${name}" wirklich löschen?\n\nZugewiesene Projekte bleiben erhalten, verlieren aber diesen Lehrer. Diese Aktion kann nicht rückgängig gemacht werden.`)) return;
                try {
                  if (window.KRS_MODE === 'produktiv') {
                    await (new window.KrsDataService()).deleteUser(editingId);
                    // v22: Tabelle sofort neu laden (Realtime-Echo kommt ggf. verspätet)
                    if (typeof loadAll === 'function') await loadAll();
                  } else {
                    const i = mockLehrerData.findIndex(l => l.id === editingId);
                    if (i !== -1) mockLehrerData.splice(i, 1);
                  }
                  showToast('Lehrer gelöscht', 'success');
                } catch (err) {
                  showToast('Fehler: ' + err.message, 'error');
                  return;
                }
                setModal(null);
                setFormData(null);
                setEditingId(null);
              }}>Löschen</button>
            `}
            <button class="btn btn-success" onClick=${async () => {
              if (!formData.name || !formData.email) {
                showToast('Name und E-Mail sind erforderlich', 'error');
                return;
              }
              try {
                if (window.KRS_MODE === 'produktiv') {
                  const svc = new window.KrsDataService();
                  const payload = {
                    name: formData.name,
                    email: formData.email,
                    rolle: formData.rolle || 'projektlehrer',
                    klassenlehrer_von: formData.klassenlehrer_von || null,
                  };
                  if (editingId === 'new') {
                    await svc.createUser(payload);
                    showToast('Lehrer hinzugefügt!', 'success');
                  } else {
                    await svc.updateUser(editingId, payload);
                    showToast('Lehrer aktualisiert!', 'success');
                  }
                  // v22: Tabelle sofort refreshen — nicht auf Realtime-Echo warten
                  if (typeof loadAll === 'function') await loadAll();
                } else {
                  if (editingId === 'new') {
                    mockLehrerData.push(formData);
                    showToast('Lehrer hinzugefügt!', 'success');
                  } else {
                    const idx = mockLehrerData.findIndex(l => l.id === editingId);
                    if (idx >= 0) mockLehrerData[idx] = formData;
                    showToast('Lehrer aktualisiert!', 'success');
                  }
                }
              } catch (err) {
                showToast('Fehler: ' + err.message, 'error');
                return;
              }
              setModal(null);
              setFormData(null);
              setEditingId(null);
            }}>Speichern</button>
          </div>
        </div>
      </div>
    `);
  }, [formData, editingId]);

  return html`
    <div class="main-header">
      <div>
        <h1 class="main-title">Lehrer</h1>
        <div class="main-subtitle">Lehrer-Accounts und Rollen</div>
      </div>
      <button class="btn btn-primary" onClick=${openCreateModal}>➕ Lehrer einladen</button>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr><th>Name</th><th>E-Mail</th><th>Rolle</th><th>Klassenlehrer von</th><th>Aktionen</th></tr>
        </thead>
        <tbody>
          ${mockLehrerData.length === 0 ? html`
            <tr><td colspan="5">
              <div class="empty-state">
                <span class="empty-emoji">👥</span>
                <div class="empty-title">Noch keine Lehrer eingeladen</div>
                <div class="empty-hint">Klicke oben auf "➕ Lehrer einladen", um den ersten Lehrer anzulegen.</div>
              </div>
            </td></tr>
          ` : mockLehrerData.map(u => html`
            <tr key=${u.id}>
              <td><strong>${u.name}</strong></td>
              <td>${u.email}</td>
              <td><span class=${"pill pill-" + (u.rolle === 'super_admin' ? 'error' : u.rolle === 'projektleitung' ? 'info' : 'success')}>${u.rolle}</span></td>
              <td>${u.klassenlehrer_von || '—'}</td>
              <td class="actions-cell" style="display:flex;gap:6px;flex-wrap:wrap;">
                <button class="btn btn-ghost btn-small" onClick=${() => openEditModal(u)}>✏️ Bearbeiten</button>
                <!-- v25: Magic-Link-Einladung. Auto-Link-Trigger verknüpft auth_user_id beim ersten Klick. -->
                <button class="btn btn-ghost btn-small" title="Magic-Link-Einladung per E-Mail schicken"
                  onClick=${async () => {
                    if (!u.email) { showToast('Lehrer hat keine E-Mail-Adresse.', 'error'); return; }
                    if (!window.confirm('Einladungs-Mail an ' + u.email + ' schicken?\n\nBeim Klick auf den Magic-Link wird der Lehrer automatisch eingeloggt und mit seinem App-Account verknüpft.')) return;
                    try {
                      if (window.KRS_MODE !== 'produktiv') {
                        showToast('Demo-Modus — in Produktion würde an ' + u.email + ' gemailt.', 'info');
                        return;
                      }
                      const svc = new window.KrsDataService();
                      const redirect = window.location.origin + window.location.pathname;
                      const { error } = await svc.inviteUserByEmail(u.email, redirect);
                      if (error) throw new Error(error.message);
                      showToast('✉ Einladungs-Mail an ' + u.email + ' verschickt.', 'success');
                    } catch (err) {
                      showToast('Fehler beim Einladen: ' + err.message, 'error');
                    }
                  }}>📧 Einladen</button>
              </td>
            </tr>
          `)}
        </tbody>
      </table>
    </div>
  `;
}

// === ANMELDUNGEN ===
// v20: dynamisch aus DB berechnet (früher waren Zahlen wie "423 von 455 Schülern (93%)"
//      und die Klassenliste hart kodiert — Mock aus der Prototyp-Phase).
function AnmeldungenView() {
  const service = useMemo(() => new window.KrsDataService(), []);
  const [schueler, setSchueler] = useState([]);
  const [loading, setLoading] = useState(true);
  const [loadError, setLoadError] = useState(null);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const list = await service.listSchueler();
        if (!cancelled) setSchueler(Array.isArray(list) ? list : []);
      } catch (e) {
        if (!cancelled) setLoadError(e.message || String(e));
      } finally {
        if (!cancelled) setLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, [service]);

  const { klassenStatus, gesamt, angemeldet, prozentGesamt } = useMemo(() => {
    const groups = new Map();
    let ges = 0, ang = 0;
    for (const s of schueler) {
      const k = s.klasse || '?';
      if (!groups.has(k)) groups.set(k, { klasse: k, schueler: 0, angemeldet: 0 });
      const g = groups.get(k);
      g.schueler += 1;
      ges += 1;
      // hat_gewaehlt kann als Spalte oder Status-Objekt vorliegen
      const gewaehlt = !!(s.hat_gewaehlt || (s.status && s.status.hat_gewaehlt));
      if (gewaehlt) { g.angemeldet += 1; ang += 1; }
    }
    const list = Array.from(groups.values()).sort((a, b) => String(a.klasse).localeCompare(String(b.klasse), 'de'));
    const pg = ges > 0 ? Math.round((ang / ges) * 100) : 0;
    return { klassenStatus: list, gesamt: ges, angemeldet: ang, prozentGesamt: pg };
  }, [schueler]);

  if (loading) {
    return html`<div class="card"><div class="loading">Lade Anmelde-Status aus der Datenbank …</div></div>`;
  }
  if (loadError) {
    return html`<div class="alert alert-error"><strong>Fehler beim Laden:</strong> ${loadError}</div>`;
  }

  return html`
    <div class="main-header">
      <div>
        <h1 class="main-title">Anmelde-Status</h1>
        <div class="main-subtitle">${angemeldet} von ${gesamt} Schülern (${prozentGesamt}%)</div>
      </div>
      <div class="btn-group">
        <button class="btn btn-secondary">📧 Erinnerung senden</button>
        <button class="btn btn-accent">🔒 Anmeldung schließen</button>
      </div>
    </div>

    <div class="card">
      <h2>📊 Anmelde-Status pro Klasse</h2>
      ${klassenStatus.length === 0 ? html`
        <div class="empty-state" style="padding:1rem; color:var(--muted);">
          Noch keine Schüler in der Datenbank. Erst CSV-Import durchführen, dann erscheint hier der Anmelde-Status.
        </div>
      ` : klassenStatus.map(k => {
        const prozent = k.schueler > 0 ? Math.round((k.angemeldet / k.schueler) * 100) : 0;
        const fehlt = k.schueler - k.angemeldet;
        return html`
          <div class="stat-row">
            <div class="stat-label">Klasse ${k.klasse}</div>
            <div class="stat-bar">
              <div class=${"stat-bar-fill " + (prozent >= 95 ? 'w1' : prozent >= 80 ? 'w2' : 'w3')} style=${"width:" + Math.max(prozent, 3) + "%"}>
                ${k.angemeldet}/${k.schueler}
              </div>
            </div>
            <div class="stat-value">${fehlt > 0 ? `${fehlt} fehlen` : '✓'}</div>
          </div>
        `;
      })}
    </div>

    <div class="alert alert-info">
      <strong>💡 Nächster Schritt:</strong> Wenn alle angemeldet sind (oder nach Deadline), kannst du die Anmeldung schließen und die Verteilung starten.
    </div>
  `;
}

// === VERTEILUNG ===
//
// Dual-Mode:
//   - Demo:      `window.VerteilungsAlgorithmus` (client-seitig) auf
//                synthetischen Test-Schülern (455 generierte Codes).
//   - Produktiv: `service.runVerteilung({ commit: false })` für Preview,
//                `commit: true` für die finale Festschreibung. Server-RPC
//                läuft als Random Serial Dictatorship über die echten
//                wahlen-Tabelleninhalte.
//
// Das UI-Schema (Pre-Flight → Simulation → Commit) bleibt in beiden
// Modi gleich; im Produktiv-Modus dient der Preview-Lauf zugleich als
// Pre-Flight (zeigt Probleme auf, die der Algorithmus erkennt).
function VerteilungView({ setModal, reload }) {
  const service = useMemo(() => new window.KrsDataService(), []);
  const isDemo = service.mode !== 'produktiv';

  const [preflight, setPreflight] = useState(null);
  const [simulation, setSimulation] = useState(null);
  const [running, setRunning] = useState(false);
  const [seed, setSeed] = useState('');
  const [committed, setCommitted] = useState(false);
  const [error, setError] = useState(null);
  const [simDauer, setSimDauer] = useState(null); // Task #6: Dauer-Tracking

  // ---------- Demo-Helfer (nur Demo-Modus) ----------
  const testProjekte = mockProjekteData.map(p => ({
    id: p.id, titel: p.titel, max_plaetze: p.max_plaetze, min_teilnehmer: p.min_teilnehmer,
    min_klasse: p.min_klasse, max_klasse: p.max_klasse
  }));

  const generateTestSchueler = () => {
    const result = [];
    for (let i = 1; i <= 455; i++) {
      const wahlIds = [];
      while (wahlIds.length < 3) {
        const id = testProjekte[Math.floor(Math.random() * testProjekte.length)].id;
        if (!wahlIds.includes(id)) wahlIds.push(id);
      }
      result.push({
        code: `S${String(i).padStart(3, '0')}`,
        klassenstufe: 5 + Math.floor(Math.random() * 5),
        wahlen: { erstwahl_id: wahlIds[0], zweitwahl_id: wahlIds[1], drittwahl_id: wahlIds[2] }
      });
    }
    return result;
  };

  // ---------- Demo: Pre-Flight (client-seitig) ----------
  const runPreflightDemo = () => {
    const algo = new window.VerteilungsAlgorithmus();
    const result = algo.preFlightCheck({ schueler: generateTestSchueler(), projekte: testProjekte });
    setPreflight(result);
  };

  // ---------- Produktiv: Pre-Flight (Server-Preview) ----------
  // Wir lassen die RPC einmal im Preview-Modus laufen und leiten Warnungen
  // / Fehler aus der Antwort ab. So nutzen Demo und Produktiv exakt den
  // gleichen Algorithmus für Pre-Flight.
  const runPreflightLive = async () => {
    setRunning(true);
    setError(null);
    try {
      const r = await service.runVerteilung({ seed: null, commit: false });
      if (!r || r.success === false) {
        setPreflight({ ok: false, fehler: [{ message: r?.error || 'Pre-Flight fehlgeschlagen' }], warnungen: [] });
        return;
      }
      const fehler = [];
      const warnungen = [];
      const stat = r.statistik || {};
      const total = stat.gesamt_schueler || 0;
      if (!total) {
        fehler.push({ message: 'Keine Schüler mit Wahlen gefunden — bitte zuerst Anmeldungen einsammeln.' });
      }
      if ((r.nicht_zugeteilt || []).length > 0) {
        warnungen.push({ message: `${r.nicht_zugeteilt.length} Schüler:innen konnten in keine ihrer drei Wahlen verteilt werden — sie müssen manuell umgebucht werden.` });
      }
      const auslastung = r.projekte_auslastung || [];
      const unter = auslastung.filter(p => p.unter_minimum);
      if (unter.length > 0) {
        warnungen.push({ message: `${unter.length} Projekt(e) liegen unter ihrem Mindest-Teilnehmer-Wert: ${unter.map(p => p.titel).join(', ')}.` });
      }
      setPreflight({ ok: fehler.length === 0, fehler, warnungen, _live: true });
    } catch (err) {
      setError(err.message || String(err));
      setPreflight({ ok: false, fehler: [{ message: err.message || String(err) }], warnungen: [] });
    } finally {
      setRunning(false);
    }
  };

  const runPreflight = () => (isDemo ? runPreflightDemo() : runPreflightLive());

  // ---------- Demo: Simulation (client-seitig) ----------
  const runSimulationDemo = () => {
    setRunning(true);
    setSimDauer(null);
    const t0 = Date.now();
    setTimeout(() => {
      const algo = new window.VerteilungsAlgorithmus();
      const newSeed = seed || `sim-${Date.now()}`;
      const result = algo.verteile({ schueler: generateTestSchueler(), projekte: testProjekte, seed: newSeed });
      setSimulation(result);
      setSeed(result.seed || newSeed);
      setSimDauer(Date.now() - t0);
      setRunning(false);
    }, 600);
  };

  // ---------- Produktiv: Simulation (Server-Preview) ----------
  const runSimulationLive = async () => {
    setRunning(true);
    setError(null);
    setSimDauer(null);
    const t0 = Date.now();
    try {
      // Task #6: Empty-State-Prüfung
      const schuelerCount = (mockSchueler || []).filter(s => s.hat_gewaehlt).length;
      if (schuelerCount === 0) {
        setError('Keine Schüler mit Wahlen in der Datenbank — Verteilung kann nicht simuliert werden. Erst CSV-Import und Anmeldephase abschließen.');
        setSimulation(null);
        setRunning(false);
        return;
      }
      const r = await service.runVerteilung({ seed: seed || null, commit: false });
      if (!r || r.success === false) {
        setError(r?.error || 'Simulation fehlgeschlagen');
        setSimulation(null);
        return;
      }
      setSimulation(r);
      setSeed(r.seed || seed);
      setSimDauer(r.dauer_ms != null ? r.dauer_ms : Date.now() - t0);
    } catch (err) {
      setError(err.message || String(err));
      setSimulation(null);
    } finally {
      setRunning(false);
    }
  };

  const runSimulation = () => (isDemo ? runSimulationDemo() : runSimulationLive());

  // ---------- Festschreiben ----------
  const commitFinal = async () => {
    if (isDemo) {
      setCommitted(true);
      setModal(null);
      return;
    }
    try {
      const r = await service.runVerteilung({ seed: simulation?.seed || seed || null, commit: true });
      if (!r || r.success === false) {
        showToast('Festschreiben fehlgeschlagen: ' + (r?.error || 'unbekannt'), 'error');
        return;
      }
      setCommitted(true);
      setModal(null);
      showToast(`✓ Verteilung festgeschrieben — ${r.statistik?.gesamt_schueler || 0} Zuteilungen geschrieben`, 'success');
      if (typeof reload === 'function') reload();
    } catch (err) {
      showToast('Festschreiben fehlgeschlagen: ' + (err.message || err), 'error');
    }
  };

  // ---------- Zurücksetzen (Demo-Modus) ----------
  // Leert alle lokalen Phase-States, damit man eine neue Verteilung simulieren kann.
  // Im Produktiv-Modus setzen wir zusätzlich die Client-Caches zurück und laden neu,
  // damit die serverseitige Historie angezeigt wird (persistiert bleibt sie natürlich).
  const resetVerteilung = () => {
    setPreflight(null);
    setSimulation(null);
    setSeed('');
    setError(null);
    setCommitted(false);
    if (!isDemo) {
      // Produktiv: frisch nachladen, damit Historie und aktueller Stand stimmen
      if (typeof reload === 'function') reload();
    } else {
      // Demo: auch lokale Ergebnis-Caches leeren, falls ein früherer Lauf sie befüllt hat
      try { replaceArray(mockZuteilungenData, []); } catch(_) {}
      try { replaceArray(mockVerteilungenData, []); } catch(_) {}
    }
    showToast('Verteilung zurückgesetzt — du kannst neu simulieren.', 'success');
  };

  const confirmReset = () => {
    if (!committed && !preflight && !simulation) {
      // Nichts zu resetten
      resetVerteilung();
      return;
    }
    setModal(html`
      <div class="modal-overlay" onClick=${() => setModal(null)}>
        <div class="modal-content" onClick=${e => e.stopPropagation()}>
          <button class="modal-close" onClick=${() => setModal(null)} aria-label="Schließen" title="Schließen (ESC)">×</button>
          <h2>🔄 Verteilung zurücksetzen?</h2>
          <p>Damit startest du den Verteilungs-Prozess von vorn (Pre-Flight → Simulation → Festschreiben).</p>
          ${isDemo
            ? html`<div class="alert alert-info">
                <strong>Demo-Modus:</strong> Nichts wird auf einem Server verändert — das ist nur ein UI-Reset, damit du erneut simulieren kannst.
              </div>`
            : html`<div class="alert alert-warning">
                <strong>Produktiv:</strong> Bereits festgeschriebene Verteilungen bleiben in der Datenbank erhalten (Historie). Der Reset-Button leert nur die aktuelle Ansicht.
              </div>`
          }
          <div class="btn-group" style="margin-top:16px;">
            <button class="btn btn-ghost" onClick=${() => setModal(null)}>Abbrechen</button>
            <button class="btn btn-primary" onClick=${() => { setModal(null); resetVerteilung(); }}>✓ Ja, zurücksetzen</button>
          </div>
        </div>
      </div>
    `);
  };

  const commit = () => {
    setModal(html`
      <div class="modal-overlay" onClick=${() => setModal(null)}>
        <div class="modal-content" onClick=${e => e.stopPropagation()}>
          <button class="modal-close" onClick=${() => setModal(null)} aria-label="Schließen" title="Schließen (ESC)">×</button>
          <h2>⚠️ Verteilung festschreiben</h2>
          <p>Bist du sicher, dass du diese Verteilung festschreiben willst?</p>
          <div class="alert alert-warning">
            <strong>Das bedeutet:</strong><br/>
            • Alle bisherigen Zuteilungen werden gelöscht und durch die neue ersetzt<br/>
            • Die neue Verteilung wird als "aktiv" markiert<br/>
            • Ältere Verteilungsläufe bleiben in der Historie sichtbar<br/>
            • Umbuchungen sind danach nur noch manuell möglich<br/>
            • Seed <code>${simulation?.seed || seed || '(zufällig)'}</code> wird gespeichert
          </div>
          <div class="btn-group" style="margin-top:16px;">
            <button class="btn btn-ghost" onClick=${() => setModal(null)}>Abbrechen</button>
            <button class="btn btn-success" onClick=${commitFinal}>✓ Ja, festschreiben</button>
          </div>
        </div>
      </div>
    `);
  };

  return html`
    <div class="main-header">
      <div>
        <h1 class="main-title">🎲 Verteilung</h1>
        <div class="main-subtitle">
          Random Serial Dictatorship mit reproduzierbarem Seed
          ${isDemo ? html` · <span class="pill pill-info">Demo-Modus</span>` : html` · <span class="pill pill-success">Live (Server-RPC)</span>`}
        </div>
      </div>
      <div class="btn-group">
        ${(preflight || simulation || committed) && html`
          <button class="btn btn-ghost" onClick=${confirmReset} title="Preflight, Simulation und Commit-Status zurücksetzen">🔄 Zurücksetzen</button>
        `}
      </div>
    </div>

    ${error && html`<div class="alert alert-error">⚠️ ${error}</div>`}

    ${committed ? html`
      <div class="alert alert-success" style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
        <div style="flex:1;min-width:220px;">
          <strong>✓ Verteilung festgeschrieben!</strong><br/>
          Die Zuteilungen sind aktiv. Seed: <code>${simulation?.seed || seed}</code>
        </div>
        <button class="btn btn-primary btn-small" onClick=${confirmReset}>🔄 Neue Verteilung starten</button>
      </div>
    ` : null}

    <div class="phase-tabs">
      <div class=${"phase-tab " + (!preflight ? "active" : "")}>1. Pre-Flight</div>
      <div class=${"phase-tab " + (preflight && !simulation ? "active" : "")}>2. Simulation</div>
      <div class=${"phase-tab " + (simulation && !committed ? "active" : "")}>3. Festschreiben</div>
    </div>

    <div class="card">
      <h2>Schritt 1: Pre-Flight-Check</h2>
      <p>
        Bevor die Verteilung läuft, prüfen wir: Passen Plätze und Schüler? Gibt es Überbuchungen? Wer hat sich nicht angemeldet?
        ${!isDemo && html`<br/><small>(Im Live-Modus läuft die Simulation einmal im Preview-Modus, ohne etwas zu speichern.)</small>`}
      </p>

      ${!preflight ? html`
        <button class="btn btn-primary" onClick=${runPreflight} disabled=${running}>
          ${running ? '⏳ Läuft...' : 'Pre-Flight-Check starten'}
        </button>
      ` : html`
        <div class=${"alert " + (preflight.ok ? "alert-success" : "alert-error")}>
          ${preflight.ok ? '✓ Pre-Flight erfolgreich — Verteilung kann laufen.' : '❌ Es gibt Blocker für die Verteilung!'}
        </div>

        ${preflight.fehler.length > 0 && html`
          <h3 style="color:var(--error);">Fehler:</h3>
          ${preflight.fehler.map(f => html`<div class="alert alert-error">${f.message}</div>`)}
        `}

        ${preflight.warnungen.length > 0 && html`
          <h3 style="color:var(--krs-gelb-dark);">Warnungen:</h3>
          ${preflight.warnungen.map(w => html`<div class="alert alert-warning">${w.message}</div>`)}
        `}

        <button class="btn btn-ghost btn-small" onClick=${() => setPreflight(null)}>Erneut prüfen</button>
      `}
    </div>

    ${preflight?.ok && html`
      <div class="card">
        <h2>Schritt 2: Probelauf</h2>
        <p>Beim Probelauf wird verteilt, aber noch nichts gespeichert. Du kannst verschiedene Seeds ausprobieren.</p>

        <div class="input-group">
          <label>Seed (optional — leer lassen für zufällig)</label>
          <input type="text" value=${seed} onInput=${e => setSeed(e.target.value)} placeholder="z.B. projekttage-2026-v1" />
        </div>

        <!-- Task #6: Simulation deaktivieren wenn Pre-Flight Fehler hat -->
        <button class="btn btn-primary" onClick=${runSimulation} disabled=${running || (preflight && preflight.fehler && preflight.fehler.length > 0)}>
          ${running ? html`<span>⏳ Algorithmus rechnet…</span>` : '▶️ Simulation starten'}
        </button>
        ${preflight && preflight.fehler && preflight.fehler.length > 0 && html`
          <div class="alert alert-warning" style="margin-top:8px;font-size:13px;">Erst alle Pre-Flight-Fehler beheben, dann kann die Simulation starten.</div>
        `}
        <!-- Task #6: Loading-Overlay während Simulation läuft -->
        ${running && html`
          <div style="position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;">
            <div style="width:48px;height:48px;border:5px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px;"></div>
            <div style="font-size:16px;font-weight:600;">Algorithmus rechnet…</div>
            <div style="font-size:13px;opacity:0.8;margin-top:6px;">Bitte warten, nichts klicken</div>
          </div>
        `}

        ${simulation && html`
          <div class="alert alert-info" style="margin-top:16px;">
            <strong>Simulation fertig</strong> · Seed: <code>${simulation.seed}</code> · Dauer: ${simDauer != null ? (simDauer < 1000 ? '<1 Sek' : (simDauer / 1000).toFixed(1) + ' Sek') : '<1 Sek'}
          </div>

          <h3>Ergebnis der Simulation</h3>
          <div class="stat-row">
            <div class="stat-label">1. Wahl</div>
            <div class="stat-bar"><div class="stat-bar-fill w1" style=${"width:" + simulation.statistik.prozent_erstwahl + "%"}>${simulation.statistik.erstwahl} (${simulation.statistik.prozent_erstwahl}%)</div></div>
          </div>
          <div class="stat-row">
            <div class="stat-label">2. Wahl</div>
            <div class="stat-bar"><div class="stat-bar-fill w2" style=${"width:" + simulation.statistik.prozent_zweitwahl + "%"}>${simulation.statistik.zweitwahl} (${simulation.statistik.prozent_zweitwahl}%)</div></div>
          </div>
          <div class="stat-row">
            <div class="stat-label">3. Wahl</div>
            <div class="stat-bar"><div class="stat-bar-fill w3" style=${"width:" + simulation.statistik.prozent_drittwahl + "%"}>${simulation.statistik.drittwahl} (${simulation.statistik.prozent_drittwahl}%)</div></div>
          </div>
          ${simulation.statistik.nicht_zugeteilt > 0 && html`
            <div class="stat-row">
              <div class="stat-label">Manuell</div>
              <div class="stat-bar"><div class="stat-bar-fill none" style=${"width:" + (simulation.statistik.nicht_zugeteilt / simulation.statistik.gesamt_schueler * 100) + "%"}>${simulation.statistik.nicht_zugeteilt}</div></div>
            </div>
          `}

          <h3>Projekt-Auslastung</h3>
          <div class="table-wrapper">
            <table>
              <thead><tr><th>Projekt</th><th>Belegt</th><th>Status</th></tr></thead>
              <tbody>
                ${simulation.projekte_auslastung.map(p => html`
                  <tr>
                    <td>${p.titel}</td>
                    <td>${p.belegt}/${p.max}</td>
                    <td>
                      ${p.belegt === p.max ? html`<span class="pill pill-success">voll</span>` :
                        p.unter_minimum ? html`<span class="pill pill-error">⚠️ unter Minimum</span>` :
                        html`<span class="pill pill-info">okay</span>`}
                    </td>
                  </tr>
                `)}
              </tbody>
            </table>
          </div>

          <div class="btn-group" style="margin-top:16px;">
            <button class="btn btn-ghost" onClick=${runSimulation}>🔄 Mit anderem Seed</button>
            <button class="btn btn-success" onClick=${commit}>✓ Diese Verteilung festschreiben</button>
          </div>
        `}
      </div>
    `}
  `;
}

// === ZUTEILUNGEN ===
//
// Quelle: View `zuteilungen_detail` (Produktiv) bzw. window.MOCK_ZUTEILUNGEN
// (Demo). Beide Shapes werden mit normalizeZuteilungRow vereinheitlicht.
function normalizeZuteilungRow(z) {
  return {
    schueler_code: z.schueler_code || z.code || '',
    vorname:       z.vorname || '',
    nachname:      z.nachname || '',
    klasse:        z.klasse || '',
    klassenstufe:  z.klassenstufe || null,
    projekt_id:    z.projekt_id || null,
    projekt_titel: z.projekt_titel || z.projekt || '(kein Projekt)',
    wahl_nr:       z.wahl_nr || 0,
    verteilung_id: z.verteilung_id || null,
    kommentar:     z.kommentar || ''
  };
}

function ZuteilungenView({ setModal, refreshKey, reload }) {
  const service = useMemo(() => new window.KrsDataService(), []);
  const isDemo = service.mode !== 'produktiv';

  const [search, setSearch] = useState('');
  const [filterKlasse, setFilterKlasse] = useState('');
  const [filterProjekt, setFilterProjekt] = useState('');
  const [filterWahl, setFilterWahl] = useState('');

  // Quelle: live geladene Zuteilungen, oder im Demo-Mode aus mockSchueler ableiten
  const zuteilungen = useMemo(() => {
    if (isDemo) {
      // Im Demo-Mode haben wir keine echten Zuteilungen — synthetisieren wir
      // sie aus mockSchueler.zuteilung (das ist im Demo ein Projekt-Titel).
      return (mockSchueler || [])
        .filter(s => s.zuteilung)
        .map(s => normalizeZuteilungRow({
          schueler_code: s.code,
          vorname: s.vorname,
          nachname: s.nachname,
          klasse: s.klasse,
          klassenstufe: s.klassenstufe,
          projekt_titel: s.zuteilung,
          wahl_nr: 1
        }));
    }
    return (mockZuteilungenData || []).map(normalizeZuteilungRow);
  }, [refreshKey, isDemo]);

  const klassen = useMemo(
    () => Array.from(new Set(zuteilungen.map(z => z.klasse).filter(Boolean))).sort(),
    [zuteilungen]
  );
  const projekte = useMemo(
    () => Array.from(new Set(zuteilungen.map(z => z.projekt_titel).filter(Boolean))).sort(),
    [zuteilungen]
  );

  const gefiltert = useMemo(() => {
    const q = search.trim().toLowerCase();
    return zuteilungen.filter(z => {
      if (filterKlasse && z.klasse !== filterKlasse) return false;
      if (filterProjekt && z.projekt_titel !== filterProjekt) return false;
      if (filterWahl && String(z.wahl_nr) !== filterWahl) return false;
      if (!q) return true;
      return (
        z.schueler_code.toLowerCase().includes(q) ||
        z.vorname.toLowerCase().includes(q) ||
        z.nachname.toLowerCase().includes(q)
      );
    });
  }, [zuteilungen, search, filterKlasse, filterProjekt, filterWahl]);

  // Aggregat: pro Wahl-Nr + nicht-zugeteilte Differenz
  const aggregate = useMemo(() => {
    const out = { 1: 0, 2: 0, 3: 0, andere: 0, total: zuteilungen.length };
    zuteilungen.forEach(z => {
      if (z.wahl_nr === 1) out[1]++;
      else if (z.wahl_nr === 2) out[2]++;
      else if (z.wahl_nr === 3) out[3]++;
      else out.andere++;
    });
    return out;
  }, [zuteilungen]);

  // Umbuchen-Modal: zeigt aktuelle Zuteilung + Auswahl Zielprojekt + Begründung
  const openUmbuchen = (z) => {
    let neuesProjekt = null;
    let kommentar = '';
    setModal(html`
      <div class="modal-overlay" onClick=${() => setModal(null)}>
        <div class="modal-content" onClick=${e => e.stopPropagation()}>
          <button class="modal-close" onClick=${() => setModal(null)} aria-label="Schließen" title="Schließen (ESC)">×</button>
          <h2>🔀 Umbuchen: ${z.vorname} ${z.nachname}</h2>
          <p><small>${z.schueler_code} · ${z.klasse} · aktuell in <strong>${z.projekt_titel}</strong></small></p>
          <div class="input-group">
            <label>Neues Projekt</label>
            <select id="umb-target">
              <option value="">— wählen —</option>
              ${(mockProjekteData || []).filter(p => p.id !== z.projekt_id).map(p => html`
                <option value=${p.id}>${p.titel}</option>
              `)}
            </select>
          </div>
          <div class="input-group">
            <label>Kommentar (optional)</label>
            <textarea id="umb-comment" placeholder="z.B. „Wunsch der Eltern", „Tausch nach Absprache"..."></textarea>
          </div>
          <div class="btn-group">
            <button class="btn btn-ghost" onClick=${() => setModal(null)}>Abbrechen</button>
            <button class="btn btn-primary" onClick=${async () => {
              const sel = document.getElementById('umb-target');
              const com = document.getElementById('umb-comment');
              neuesProjekt = sel ? sel.value : null;
              kommentar = com ? com.value : '';
              if (!neuesProjekt) {
                showToast('Bitte ein Zielprojekt auswählen', 'error');
                return;
              }
              try {
                const r = await service.updateZuteilung({
                  code: z.schueler_code,
                  projektId: neuesProjekt,
                  kommentar: kommentar || null
                });
                if (r && r.success === false) {
                  showToast('Fehler: ' + (r.error || 'unbekannt'), 'error');
                  return;
                }
                showToast(`${z.vorname} umgebucht`, 'success');
                setModal(null);
                if (typeof reload === 'function') reload();
              } catch (err) {
                showToast('Fehler: ' + (err.message || err), 'error');
              }
            }}>✓ Umbuchen</button>
          </div>
        </div>
      </div>
    `);
  };

  return html`
    <div class="main-header">
      <div>
        <h1 class="main-title">🎯 Zuteilungen</h1>
        <div class="main-subtitle">
          ${zuteilungen.length} Schüler:innen zugeteilt
          ${isDemo ? html` · <span class="pill pill-info">Demo</span>` : html` · <span class="pill pill-success">Live</span>`}
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-ghost btn-small" onClick=${() => reload && reload()}>🔄 Neu laden</button>
      </div>
    </div>

    <div class="dash-grid">
      <div class="dash-tile"><div class="dash-tile-label">1. Wahl</div><div class="dash-tile-value">${aggregate[1]}</div></div>
      <div class="dash-tile"><div class="dash-tile-label">2. Wahl</div><div class="dash-tile-value">${aggregate[2]}</div></div>
      <div class="dash-tile"><div class="dash-tile-label">3. Wahl</div><div class="dash-tile-value">${aggregate[3]}</div></div>
      <div class="dash-tile"><div class="dash-tile-label">Manuell</div><div class="dash-tile-value">${aggregate.andere}</div></div>
    </div>

    <div class="card">
      <div class="form-grid">
        <div class="input-group">
          <label>Suche (Code oder Name)</label>
          <input type="text" value=${search} onInput=${e => setSearch(e.target.value)} placeholder="z.B. 8A-T4P1 oder Anna" />
        </div>
        <div class="input-group">
          <label>Klasse</label>
          <select value=${filterKlasse} onChange=${e => setFilterKlasse(e.target.value)}>
            <option value="">— alle —</option>
            ${klassen.map(k => html`<option value=${k}>${k}</option>`)}
          </select>
        </div>
        <div class="input-group">
          <label>Projekt</label>
          <select value=${filterProjekt} onChange=${e => setFilterProjekt(e.target.value)}>
            <option value="">— alle —</option>
            ${projekte.map(p => html`<option value=${p}>${p}</option>`)}
          </select>
        </div>
        <div class="input-group">
          <label>Wahl-Nr.</label>
          <select value=${filterWahl} onChange=${e => setFilterWahl(e.target.value)}>
            <option value="">— alle —</option>
            <option value="1">1. Wahl</option>
            <option value="2">2. Wahl</option>
            <option value="3">3. Wahl</option>
            <option value="0">Manuell (0)</option>
          </select>
        </div>
      </div>

      <p><small>${gefiltert.length} von ${zuteilungen.length} angezeigt</small></p>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Code</th>
              <th>Name</th>
              <th>Klasse</th>
              <th>Projekt</th>
              <th>Wahl</th>
              <th>Aktion</th>
            </tr>
          </thead>
          <tbody>
            ${gefiltert.slice(0, 200).map(z => html`
              <tr key=${z.schueler_code}>
                <td><code>${z.schueler_code}</code></td>
                <td>${z.vorname} ${z.nachname}</td>
                <td>${z.klasse}</td>
                <td>${z.projekt_titel}</td>
                <td>
                  ${z.wahl_nr === 1 ? html`<span class="pill pill-success">1.</span>` :
                    z.wahl_nr === 2 ? html`<span class="pill pill-info">2.</span>` :
                    z.wahl_nr === 3 ? html`<span class="pill pill-warning">3.</span>` :
                    html`<span class="pill">manuell</span>`}
                </td>
                <td>
                  <button class="btn btn-ghost btn-small" onClick=${() => openUmbuchen(z)} disabled=${isDemo}>
                    ${isDemo ? 'Demo' : '🔀 Umbuchen'}
                  </button>
                </td>
              </tr>
            `)}
          </tbody>
        </table>
        ${gefiltert.length > 200 && html`<p><small>… ${gefiltert.length - 200} weitere ausgeblendet — Filter setzen, um sie zu sehen.</small></p>`}
      </div>

      ${zuteilungen.length === 0 && html`
        <div class="alert alert-info">
          Noch keine Zuteilungen vorhanden. ${isDemo ? '' : 'Führe zuerst die Verteilung aus.'}
        </div>
      `}
    </div>
  `;
}

// === MANUELLE UMBUCHUNG ===
//
// Dual-Mode:
//   - Demo:      Mutation auf mockSchueler.zuteilung (Projekt-Titel als String)
//   - Produktiv: service.updateZuteilung({ code, projektId, kommentar })
//                — RPC akzeptiert Überbuchung (flagged), prüft Klassenstufe.
function UmbuchungView({ setModal, refreshKey, reload }) {
  const service = useMemo(() => new window.KrsDataService(), []);
  const isDemo = service.mode !== 'produktiv';

  const [searchText, setSearchText] = useState('');
  const [selectedStudent, setSelectedStudent] = useState(null);
  const [selectedProject, setSelectedProject] = useState(null);
  const [reason, setReason] = useState('');
  const [busy, setBusy] = useState(false);

  // Aktuelle Zuteilung des ausgewählten Schülers — aus mockZuteilungenData
  const aktuelleZuteilung = useMemo(() => {
    if (!selectedStudent) return null;
    if (isDemo) return selectedStudent.zuteilung || null;
    const z = (mockZuteilungenData || []).find(x =>
      String(x.schueler_code || '').toUpperCase() === String(selectedStudent.code || '').toUpperCase()
    );
    return z ? z.projekt_titel || z.projekt : null;
  }, [selectedStudent, refreshKey, isDemo]);

  const searchResults = useMemo(() => {
    return (mockSchueler || []).filter(s => {
      const q = searchText.toLowerCase();
      return q && (
        s.code.toLowerCase().includes(q) ||
        s.vorname.toLowerCase().includes(q) ||
        s.nachname.toLowerCase().includes(q)
      );
    }).slice(0, 8);
  }, [searchText, refreshKey]);

  const handleUmbuchung = async () => {
    if (!selectedStudent || !selectedProject || reason.length < 10) {
      showToast('Bitte alle Felder ausfüllen (Grund mind. 10 Zeichen)', 'error');
      return;
    }
    setBusy(true);
    try {
      if (isDemo) {
        // Demo: Mutation in-memory
        const projObj = (mockProjekteData || []).find(p => p.id === selectedProject || p.titel === selectedProject);
        const projTitel = projObj ? projObj.titel : selectedProject;
        mockUmbuchungen.push({
          timestamp: new Date().toISOString(),
          schueler: selectedStudent,
          altes_projekt: selectedStudent.zuteilung,
          neues_projekt: projTitel,
          grund: reason
        });
        selectedStudent.zuteilung = projTitel;
        showToast(`${selectedStudent.vorname} erfolgreich in ${projTitel} umgebucht!`, 'success');
      } else {
        // Produktiv: Service-Call → RPC update_zuteilung
        const r = await service.updateZuteilung({
          code: selectedStudent.code,
          projektId: selectedProject,
          kommentar: reason
        });
        if (r && r.success === false) {
          showToast('Fehler: ' + (r.error || 'unbekannt'), 'error');
          return;
        }
        if (r && r.ueberbucht) {
          // RPC `update_zuteilung` liefert `neue_belegung` + `max_plaetze`
          showToast(`Umgebucht — ⚠️ Projekt ist jetzt überbucht (${r.neue_belegung}/${r.max_plaetze})`, 'success');
        } else {
          showToast(`${selectedStudent.vorname} erfolgreich umgebucht`, 'success');
        }
        if (typeof reload === 'function') reload();
      }
      setSearchText('');
      setSelectedStudent(null);
      setSelectedProject(null);
      setReason('');
    } catch (err) {
      showToast('Fehler: ' + (err.message || err), 'error');
    } finally {
      setBusy(false);
    }
  };

  return html`
    <div class="main-header">
      <h1 class="main-title">🔀 Manuelle Umbuchung</h1>
      <div class="main-subtitle">Einzelne Schüler in andere Projekte verschieben</div>
    </div>

    <div class="card">
      <h2>Schüler suchen</h2>
      <div class="input-group">
        <label>Code oder Name</label>
        <input type="text" value=${searchText} onInput=${e => setSearchText(e.target.value)} placeholder="z.B. 8A-T4P1 oder Anna..." />
      </div>

      ${searchText && searchResults.length > 0 && html`
        <div style="margin-top:12px;">
          ${searchResults.map(s => html`
            <div style="padding:10px;border:1px solid var(--border);border-radius:6px;margin-bottom:8px;cursor:pointer;${selectedStudent?.code === s.code ? 'background:var(--krs-blau-lighter);border-color:var(--krs-blau);' : ''}" onClick=${() => { setSelectedStudent(s); setSelectedProject(null); setReason(''); }}>
              <strong>${s.vorname} ${s.nachname}</strong> <span style="color:var(--text-muted);">${s.code} · ${s.klasse}</span><br/>
              <small>Aktuell: ${(isDemo ? s.zuteilung : null) || 'wird beim Auswählen geladen'}</small>
            </div>
          `)}
        </div>
      `}
      ${searchText && searchResults.length === 0 && html`
        <p><small style="color:var(--text-muted);">Keine Treffer.</small></p>
      `}
    </div>

    ${selectedStudent && html`
      <div class="card">
        <h2>Umbuchung für ${selectedStudent.vorname} ${selectedStudent.nachname}</h2>
        <p>
          <small>
            ${selectedStudent.code} · ${selectedStudent.klasse}
            · aktuell in <strong>${aktuelleZuteilung || '— noch nicht zugeteilt —'}</strong>
          </small>
        </p>

        <div class="input-group">
          <label>Neues Projekt</label>
          <select value=${selectedProject || ''} onChange=${e => setSelectedProject(e.target.value)}>
            <option value="">— Wählen —</option>
            ${(mockProjekteData || []).map(p => html`
              <option value=${p.id}>${p.titel}${p.max_plaetze ? ` (max ${p.max_plaetze})` : ''}</option>
            `)}
          </select>
        </div>

        <div class="input-group">
          <label>Grund (mindestens 10 Zeichen)</label>
          <textarea placeholder="Warum wird dieser Schüler umgebucht?" value=${reason} onInput=${e => setReason(e.target.value)}></textarea>
          <small>${reason.length}/10 Zeichen</small>
        </div>

        <div class="btn-group">
          <button class="btn btn-ghost" onClick=${() => { setSelectedStudent(null); setSelectedProject(null); setReason(''); setSearchText(''); }}>Abbrechen</button>
          <button class="btn btn-primary" onClick=${handleUmbuchung} disabled=${!selectedProject || reason.length < 10 || busy}>
            ${busy ? '⏳ Wird gespeichert...' : '🔀 Umbuchen'}
          </button>
        </div>
      </div>

      ${mockUmbuchungen.length > 0 && html`
        <div class="card">
          <h2>Letzte Umbuchungen</h2>
          <div class="table-wrapper">
            <table>
              <thead><tr><th>Schüler</th><th>Von</th><th>Zu</th><th>Grund</th><th>Zeit</th></tr></thead>
              <tbody>
                ${mockUmbuchungen.slice().reverse().map(u => html`
                  <tr>
                    <td>${u.schueler.vorname} ${u.schueler.nachname}</td>
                    <td>${u.altes_projekt || '—'}</td>
                    <td><strong>${u.neues_projekt}</strong></td>
                    <td><small>${u.grund}</small></td>
                    <td><small>${new Date(u.timestamp).toLocaleString('de-DE')}</small></td>
                  </tr>
                `)}
              </tbody>
            </table>
          </div>
        </div>
      `}
    `}
  `;
}

// === TAUSCHWÜNSCHE ===
//
// Datenquelle:
//   - Produktiv: View `offene_tauschwuensche` (flache Spalten
//     vorname/nachname/klasse/von_projekt_titel/nach_projekt_titel/
//     eins_zu_eins_tausch_moeglich/tauschpartner_code)
//   - Demo: mockTauschData (schon im erwarteten nested Format)
//
// Adapter `normalizeTauschRow` erkennt das Format automatisch und liefert
// die nested Shape { schueler, von_projekt, nach_projekt,
// eins_zu_eins_moeglich, tauschpartner? }, die das UI erwartet.
function normalizeTauschRow(row) {
  // Produktiv-Shape (View): hat flaches vorname/nachname und von_projekt_titel
  if ('von_projekt_titel' in row || 'vorname' in row) {
    // tauschpartner aus mockSchueler via tauschpartner_code auflösen
    let tauschpartner = null;
    if (row.eins_zu_eins_tausch_moeglich && row.tauschpartner_code) {
      const tp = (mockSchueler || []).find(s => s.code === row.tauschpartner_code);
      if (tp) {
        tauschpartner = {
          code: tp.code,
          vorname: tp.vorname,
          nachname: tp.nachname,
          klasse: tp.klasse,
        };
      }
    }
    // Partner-Tauschwunsch-ID nachladen — brauchen wir für den atomaren 1:1-Swap
    return {
      id: row.id,
      schueler: {
        code: row.schueler_code,
        vorname: row.vorname,
        nachname: row.nachname,
        klasse: row.klasse,
      },
      von_projekt: {
        id: row.von_projekt_id,
        titel: row.von_projekt_titel || '(unbekannt)',
      },
      nach_projekt: {
        id: row.nach_projekt_id,
        titel: row.nach_projekt_titel || '(offen)',
      },
      begruendung: row.begruendung,
      created_at: row.created_at,
      eins_zu_eins_moeglich: !!row.eins_zu_eins_tausch_moeglich,
      tauschpartner,
    };
  }
  // Demo-Shape — schon nested
  return row;
}

function TauschwuenscheView({ setModal, refreshKey }) {
  const service = useMemo(() => new window.KrsDataService(), []);
  const mode = service.mode;
  // Lokaler Tick für optimistisches UI nach Button-Klick
  // (Realtime würde denselben Refresh liefern, aber oft mit Latenz)
  const [tick, setTick] = useState(0);
  const bump = useCallback(() => setTick(t => t + 1), []);

  // Rohdaten aus mockTauschData → normalisiert
  const wuensche = useMemo(
    () => (mockTauschData || []).map(normalizeTauschRow),
    // refreshKey triggert Neu-Berechnung nach loadAll()
    // tick triggert Refresh nach lokaler Mutation (Button-Klick)
    [refreshKey, tick]
  );

  // Partner-Tauschwunsch-ID zu einem 1:1-Match finden
  const findePartnerTauschId = (t) => {
    if (!t.tauschpartner) return null;
    const partner = wuensche.find(w =>
      w.schueler.code === t.tauschpartner.code &&
      w.von_projekt.id === t.nach_projekt.id &&
      w.nach_projekt.id === t.von_projekt.id
    );
    return partner ? partner.id : null;
  };

  const genehmigen = (t, oneToOne = false) => {
    setModal(html`
      <div class="modal-overlay" onClick=${() => setModal(null)}>
        <div class="modal-content" onClick=${e => e.stopPropagation()}>
          <button class="modal-close" onClick=${() => setModal(null)} aria-label="Schließen" title="Schließen (ESC)">×</button>
          <h2>${oneToOne ? '🔁 1:1-Tausch genehmigen' : '✓ Tauschwunsch genehmigen'}</h2>
          ${oneToOne ? html`
            <p>
              <strong>${t.schueler.vorname} ${t.schueler.nachname}</strong> (${t.schueler.klasse})
              tauscht mit <strong>${t.tauschpartner.vorname} ${t.tauschpartner.nachname}</strong> (${t.tauschpartner.klasse}).
            </p>
            <div class="swap-highlight">
              ${t.schueler.vorname}: ${t.von_projekt.titel} → ${t.nach_projekt.titel}<br/>
              ${t.tauschpartner.vorname}: ${t.nach_projekt.titel} → ${t.von_projekt.titel}
            </div>
            <p><strong>Vorteile:</strong> Beide bekommen ihren Wunsch, keine Plätze werden freigegeben oder belegt.</p>
          ` : html`
            <p>Zuweisung für <strong>${t.schueler.vorname} ${t.schueler.nachname}</strong> (${t.schueler.klasse}):</p>
            <p>${t.von_projekt.titel} → <strong>${t.nach_projekt.titel}</strong></p>
          `}
          <div class="btn-group" style="margin-top:16px;">
            <button class="btn btn-ghost" onClick=${() => setModal(null)}>Abbrechen</button>
            <button class="btn btn-success" onClick=${async () => {
              const svc = new window.KrsDataService();
              try {
                if (mode === 'demo') {
                  // Im Demo-Modus lokal filtern
                  const idsToRemove = new Set([t.id]);
                  if (oneToOne) {
                    const partnerId = findePartnerTauschId(t);
                    if (partnerId) idsToRemove.add(partnerId);
                  }
                  replaceArray(mockTauschData, (mockTauschData || []).filter(w => !idsToRemove.has(w.id)));
                  bump();
                  setModal(null);
                  showToast('Tauschwunsch genehmigt (Demo)', 'success');
                  return;
                }
                // Produktiv: RPC aufrufen
                let result;
                if (oneToOne) {
                  const partnerId = findePartnerTauschId(t);
                  if (!partnerId) {
                    showToast('Kein passender Partner-Wunsch gefunden', 'error');
                    return;
                  }
                  result = await svc.genehmige1zu1Tausch(t.id, partnerId, null);
                } else {
                  result = await svc.genehmigeTausch(t.id, null);
                }
                if (result && result.success) {
                  setModal(null);
                  showToast(oneToOne ? '1:1-Tausch genehmigt' : 'Tauschwunsch genehmigt', 'success');
                  // Realtime bringt den Refresh — zur Sicherheit sofort lokal entfernen
                  const idsToRemove = new Set([t.id]);
                  if (oneToOne) {
                    const partnerId = findePartnerTauschId(t);
                    if (partnerId) idsToRemove.add(partnerId);
                  }
                  replaceArray(mockTauschData, (mockTauschData || []).filter(w => !idsToRemove.has(w.id)));
                  bump();
                } else {
                  showToast('Fehler: ' + (result && result.error || 'unbekannt'), 'error');
                }
              } catch (err) {
                showToast('Fehler: ' + err.message, 'error');
              }
            }}>✓ Genehmigen und tauschen</button>
          </div>
        </div>
      </div>
    `);
  };

  const ablehnen = (t) => {
    let grundRef = '';
    setModal(html`
      <div class="modal-overlay" onClick=${() => setModal(null)}>
        <div class="modal-content" onClick=${e => e.stopPropagation()}>
          <button class="modal-close" onClick=${() => setModal(null)} aria-label="Schließen" title="Schließen (ESC)">×</button>
          <h2>✗ Tauschwunsch ablehnen</h2>

            <label>Begründung (wird dem Schüler mitgeteilt)</label>

          </div>
          <div class="btn-group">
            <button class="btn btn-ghost" onClick=${() => setModal(null)}>Abbrechen</button>
            <button class="btn btn-danger" onClick=${async () => {
              const textarea = document.getElementById('tausch-ablehnung-grund');
              const grund = textarea ? textarea.value : '';
              try {
                if (mode === 'demo') {
                  replaceArray(mockTauschData, (mockTauschData || []).filter(w => w.id !== t.id));
                  bump();
                  setModal(null);
                  showToast('Tauschwunsch abgelehnt (Demo)', 'success');
                  return;
                }
                const svc = new window.KrsDataService();
                const result = await svc.lehnTauschAb(t.id, grund, null);
                if (result && result.success) {
                  setModal(null);
                  showToast('Tauschwunsch abgelehnt', 'success');
                  replaceArray(mockTauschData, (mockTauschData || []).filter(w => w.id !== t.id));
                  bump();
                } else {
                  showToast('Fehler: ' + (result && result.error || 'unbekannt'), 'error');
                }
              } catch (err) {
                showToast('Fehler: ' + err.message, 'error');
              }
            }}>✗ Ablehnen</button>
          </div>
        </div>
      </div>
    `);
  };

  const oneToOneCount = wuensche.filter(w => w.eins_zu_eins_moeglich).length;

  return html`
    <div class="main-header">
      <div>
        <h1 class="main-title">🔄 Tauschwünsche</h1>
        <div class="main-subtitle">${wuensche.length} offene Wünsche${oneToOneCount > 0 ? ` · ${oneToOneCount} mit 1:1-Tausch möglich` : ''}</div>
      </div>
    </div>

    ${oneToOneCount > 0 && html`
      <div class="alert alert-success">
        🎯 <strong>${oneToOneCount} 1:1-Tausch${oneToOneCount > 1 ? 'e' : ''} erkannt!</strong> Genehmigung mit einem Klick möglich — beide Schüler bekommen ihren Wunsch.
      </div>

    ${wuensche.length === 0 && html`
      <div class="card">

          <div class="empty-hint">Alle Schüler sind mit ihrer Zuteilung zufrieden — oder es wurden noch keine Wünsche eingereicht.</div>
        </div>
      </div>
    `}

    ${wuensche.map(t => html`
      <div class="card" key=${t.id} style=${t.eins_zu_eins_moeglich ? "border-left:4px solid var(--success);" : ""}>
        <div style="display:flex;align-items:start;justify-content:space-between;gap:16px;flex-wrap:wrap;">

              <strong style="font-size:16px;">${t.schueler.vorname} ${t.schueler.nachname}</strong>

              <span style="color:var(--text-muted);">→</span>
              <strong>${t.nach_projekt.titel}</strong>
            </div>
            <div style="padding:10px;background:var(--bg-subtle);border-radius:8px;font-size:14px;margin-bottom:8px;">
