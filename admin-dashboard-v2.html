// Task #3: CSV-Export mit echter Logik + PDF-Export (Sprint C)
function ExportView() {
  const service = useMemo(() => new window.KrsDataService(), []);
  const isDemo = service.mode !== 'produktiv';

  // UTF-8 BOM + CSV-Download
  const downloadCSV = (filename, rows, headers) => {
    const escape = v => {
      const s = String(v == null ? '' : v);
      return (s.includes(';') || s.includes('"') || s.includes('\n')) ? '"' + s.replace(/"/g, '""') + '"' : s;
    };
    const lines = [headers.map(h => h.label).join(';')];
    rows.forEach(r => lines.push(headers.map(h => escape(r[h.key])).join(';')));
    const bom = '\uFEFF';
    const blob = new Blob([bom + lines.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 2000);
  };

  const todayStr = () => new Date().toISOString().slice(0, 10);

  // ---------- PDF-Helper (Sprint C, v24) ----------
  // jsPDF ist via CDN geladen (window.jspdf.jsPDF). autotable erweitert die Klasse.
  const getJsPDF = () => {
    const lib = window.jspdf || window.jsPDF;
    if (!lib || !(lib.jsPDF || lib)) throw new Error('jsPDF nicht geladen. Seite neu laden.');
    return lib.jsPDF || lib;
  };

  // Header mit Logo + Titel + Datum auf einer Seite zeichnen
  const drawPdfHeader = (pdf, titel, subtitel) => {
    try {
      pdf.addImage(LOGO_SRC, 'JPEG', 14, 10, 16, 16);
    } catch(_) { /* Logo optional — wenn addImage fehlschlägt, ohne Logo weiter */ }
    pdf.setFontSize(15);
    pdf.setTextColor(74, 106, 131); // krs-blau
    pdf.setFont('helvetica', 'bold');
    pdf.text('Kurpfalz-Realschule Schriesheim', 34, 17);
    pdf.setFontSize(11);
    pdf.setTextColor(60, 60, 60);
    pdf.setFont('helvetica', 'normal');
    pdf.text('Projektwoche 2026 · ' + titel, 34, 24);
    if (subtitel) {
      pdf.setFontSize(9);
      pdf.setTextColor(120, 120, 120);
      pdf.text(subtitel, 34, 29);
    }
    // Datum rechts
    pdf.setFontSize(9);
    pdf.setTextColor(120, 120, 120);
    const datum = new Date().toLocaleDateString('de-DE', { year:'numeric', month:'2-digit', day:'2-digit' });
    pdf.text('Stand: ' + datum, 196, 17, { align:'right' });
    // Trennlinie
    pdf.setDrawColor(222, 228, 235);
    pdf.setLineWidth(0.3);
    pdf.line(14, 33, 196, 33);
  };

  const drawPdfFooter = (pdf, pageNum, pageCount) => {
    pdf.setFontSize(8);
    pdf.setTextColor(140, 140, 140);
    pdf.setFont('helvetica', 'normal');
    pdf.text('KRS Projektwahl 2026', 14, 290);
    pdf.text('Seite ' + pageNum + ' von ' + pageCount, 196, 290, { align:'right' });
  };

  // Gruppiert Zuteilungen nach einem Key (z.B. klasse oder projekt_titel)
  const groupBy = (rows, keyFn) => {
    const out = new Map();
    rows.forEach(r => {
      const k = keyFn(r) || '—';
      if (!out.has(k)) out.set(k, []);
      out.get(k).push(r);
    });
    return out;
  };

  // PDF: Klassenlisten — eine Seite pro Klasse mit allen Schülern und ihrem zugeteilten Projekt
  const handleExportKlassenlisten = async () => {
    try {
      const data = isDemo
        ? (window.MOCK_ZUTEILUNGEN || mockZuteilungenData || [])
        : await service.listZuteilungen();
      if (!data || data.length === 0) {
        showToast('Keine Zuteilungsdaten vorhanden. Erst Verteilung laufen lassen.', 'error'); return;
      }
      const JsPDF = getJsPDF();
      const pdf = new JsPDF({ unit:'mm', format:'a4', orientation:'portrait' });

      // Sortierung: Klasse → Nachname → Vorname
      const sorted = [...data].sort((a,b) => {
        const k = String(a.klasse||'').localeCompare(String(b.klasse||''), 'de');
        if (k !== 0) return k;
        const n = String(a.nachname||'').localeCompare(String(b.nachname||''), 'de');
        if (n !== 0) return n;
        return String(a.vorname||'').localeCompare(String(b.vorname||''), 'de');
      });
      const grouped = groupBy(sorted, r => r.klasse);
      const klassen = Array.from(grouped.keys()).sort((a,b) => a.localeCompare(b, 'de'));

      klassen.forEach((klasse, idx) => {
        if (idx > 0) pdf.addPage();
        const rows = grouped.get(klasse);
        drawPdfHeader(pdf, 'Klassenliste · ' + klasse, rows.length + ' Schüler:innen');
        pdf.autoTable({
          startY: 38,
          head: [['Nr.', 'Nachname', 'Vorname', 'Projekt', 'Wahl']],
          body: rows.map((r, i) => [
            String(i+1),
            r.nachname || '',
            r.vorname || '',
            r.projekt_titel || '—',
            r.wahl_nr ? String(r.wahl_nr) + '.' : '–'
          ]),
          styles: { fontSize:9, cellPadding:2 },
          headStyles: { fillColor:[74,106,131], textColor:[255,255,255], fontStyle:'bold' },
          alternateRowStyles: { fillColor:[244,247,249] },
          columnStyles: {
            0: { cellWidth:10, halign:'right' },
            1: { cellWidth:38 },
            2: { cellWidth:38 },
            3: { cellWidth:'auto' },
            4: { cellWidth:14, halign:'center' },
          },
          margin: { left:14, right:14 },
        });
      });

      // Footer auf jeder Seite
      const pageCount = pdf.internal.getNumberOfPages();
      for (let i = 1; i <= pageCount; i++) { pdf.setPage(i); drawPdfFooter(pdf, i, pageCount); }

      pdf.save('krs-klassenlisten-' + todayStr() + '.pdf');
      showToast('✓ Klassenlisten-PDF heruntergeladen (' + klassen.length + ' Klassen)', 'success');
    } catch (e) {
      showToast('PDF-Export fehlgeschlagen: ' + e.message, 'error');
    }
  };

  // PDF: Teilnehmerlisten — eine Seite pro Projekt mit allen zugeteilten Schüler:innen
  const handleExportTeilnehmerlisten = async () => {
    try {
      const data = isDemo
        ? (window.MOCK_ZUTEILUNGEN || mockZuteilungenData || [])
        : await service.listZuteilungen();
      if (!data || data.length === 0) {
        showToast('Keine Zuteilungsdaten vorhanden. Erst Verteilung laufen lassen.', 'error'); return;
      }
      const projekte = isDemo
        ? (mockProjekteData || [])
        : await service.listProjekte();
      const projektMeta = new Map(projekte.map(p => [p.titel, p]));

      const JsPDF = getJsPDF();
      const pdf = new JsPDF({ unit:'mm', format:'a4', orientation:'portrait' });

      const sorted = [...data].sort((a,b) => {
        const p = String(a.projekt_titel||'').localeCompare(String(b.projekt_titel||''), 'de');
        if (p !== 0) return p;
        const k = String(a.klasse||'').localeCompare(String(b.klasse||''), 'de');
        if (k !== 0) return k;
        return String(a.nachname||'').localeCompare(String(b.nachname||''), 'de');
      });
      const grouped = groupBy(sorted, r => r.projekt_titel);
      const projektTitel = Array.from(grouped.keys()).sort((a,b) => a.localeCompare(b, 'de'));

      projektTitel.forEach((titel, idx) => {
        if (idx > 0) pdf.addPage();
        const rows = grouped.get(titel);
        const meta = projektMeta.get(titel);
        const subtitel = meta
          ? ('Leitung: ' + (meta.lehrer_name || meta.lehrer || '—') + '  ·  ' + rows.length + '/' + (meta.max_plaetze || '?') + ' Plätze')
          : (rows.length + ' Teilnehmer:innen');
        drawPdfHeader(pdf, 'Teilnehmerliste · ' + titel, subtitel);

        pdf.autoTable({
          startY: 38,
          head: [['Nr.', 'Klasse', 'Nachname', 'Vorname', 'Wahl', 'Anwesend']],
          body: rows.map((r, i) => [
            String(i+1),
            r.klasse || '—',
            r.nachname || '',
            r.vorname || '',
            r.wahl_nr ? String(r.wahl_nr) + '.' : '–',
            '' // Anwesenheits-Checkbox-Spalte (leer zum Ankreuzen)
          ]),
          styles: { fontSize:9, cellPadding:2.5 },
          headStyles: { fillColor:[232,119,34], textColor:[255,255,255], fontStyle:'bold' }, // krs-orange
          alternateRowStyles: { fillColor:[253,242,232] },
          columnStyles: {
            0: { cellWidth:10, halign:'right' },
            1: { cellWidth:18, halign:'center' },
            2: { cellWidth:42 },
            3: { cellWidth:42 },
            4: { cellWidth:14, halign:'center' },
            5: { cellWidth:'auto' },
          },
          margin: { left:14, right:14 },
        });
      });

      const pageCount = pdf.internal.getNumberOfPages();
      for (let i = 1; i <= pageCount; i++) { pdf.setPage(i); drawPdfFooter(pdf, i, pageCount); }

      pdf.save('krs-teilnehmerlisten-' + todayStr() + '.pdf');
      showToast('✓ Teilnehmerlisten-PDF heruntergeladen (' + projektTitel.length + ' Projekte)', 'success');
    } catch (e) {
      showToast('PDF-Export fehlgeschlagen: ' + e.message, 'error');
    }
  };

  const handleExportGesamt = async () => {
    try {
      const data = isDemo
        ? (window.MOCK_ZUTEILUNGEN || mockZuteilungenData || [])
        : await service.listZuteilungen();
      if (!data || data.length === 0) { showToast('Noch keine Zuteilungsdaten zum Export.', 'error'); return; }
      const headers = [
        { key: 'schueler_code', label: 'Schüler-Code' },
        { key: 'vorname',       label: 'Vorname' },
        { key: 'nachname',      label: 'Nachname' },
        { key: 'klasse',        label: 'Klasse' },
        { key: 'projekt_titel', label: 'Projekt' },
        { key: 'wahl_nr',       label: 'Wahl-Nr' },
        { key: 'kommentar',     label: 'Kommentar' },
      ];
      downloadCSV('krs-zuteilungen-' + todayStr() + '.csv', data, headers);
      showToast('✓ Gesamtliste heruntergeladen (' + data.length + ' Einträge)', 'success');
    } catch (e) {
      showToast('Export fehlgeschlagen: ' + e.message, 'error');
    }
  };

  const handleExportProjektliste = async () => {
    try {
      const data = isDemo
        ? (mockProjekteData || [])
        : await service.listProjekte();
      if (!data || data.length === 0) { showToast('Noch keine Projekte zum Export.', 'error'); return; }
      const headers = [
        { key: 'id',               label: 'ID' },
        { key: 'titel',            label: 'Titel' },
        { key: 'kurzbeschreibung', label: 'Kurzbeschreibung' },
        { key: 'lehrer_name',      label: 'Lehrer' },
        { key: 'min_klasse',       label: 'Min-Klasse' },
        { key: 'max_klasse',       label: 'Max-Klasse' },
        { key: 'min_teilnehmer',   label: 'Min-Teilnehmer' },
        { key: 'max_plaetze',      label: 'Max-Plätze' },
        { key: 'status',           label: 'Status' },
      ];
      downloadCSV('krs-projektliste-' + todayStr() + '.csv', data, headers);
      showToast('✓ Projektliste heruntergeladen (' + data.length + ' Projekte)', 'success');
    } catch (e) {
      showToast('Export fehlgeschlagen: ' + e.message, 'error');
    }
  };

  return html`
    <div class="main-header">
      <h1 class="main-title">📥 Export & Aushang</h1>
    </div>
    <div class="dash-grid">
      <div class="dash-tile">
        <div class="dash-tile-label">CSV</div>
        <div class="dash-tile-value" style="font-size:18px;">Gesamtliste</div>
        <div class="dash-tile-sub">Alle Zuteilungen (Schüler + Projekt)</div>
        <button class="btn btn-primary btn-small btn-full" style="margin-top:12px;" onClick=${handleExportGesamt}>
          ⬇️ Herunterladen
        </button>

      <div class="dash-tile">

// === FEEDBACK VIEW (Task #5) ===
function FeedbackView() {
  const service = useMemo(() => new window.KrsDataService(), []);
  const isDemo = service.mode !== 'produktiv';
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState('offen'); // 'offen' | 'alle'

  const load = useCallback(async () => {
    setLoading(true);
    try {
      if (isDemo) {
        setItems([]); // Demo hat keine DB
      } else {
        const { data, error } = await service.client
          .from('feedback')
          .select('*')
          .order('erstellt_am', { ascending: false });
        if (error) throw new Error(error.message);
        setItems(data || []);
      }
    } catch (e) {
      showToast('Feedback laden fehlgeschlagen: ' + e.message, 'error');
    } finally { setLoading(false); }
  }, [service, isDemo]);

  useEffect(() => { load(); }, [load]);

  const markDone = async (id) => {
    try {
      if (!isDemo) {
        const { error } = await service.client.from('feedback').update({ erledigt: true }).eq('id', id);
        if (error) throw new Error(error.message);
      }
      setItems(prev => prev.map(x => x.id === id ? { ...x, erledigt: true } : x));
    } catch (e) { showToast('Fehler: ' + e.message, 'error'); }
  };

  const shown = filter === 'offen' ? items.filter(x => !x.erledigt) : items;
  const stars = (n) => '⭐'.repeat(n || 0) + '☆'.repeat(Math.max(0, 5 - (n || 0)));

  return html`
    <div class="main-header">
      <h1 class="main-title">💬 Feedback-Übersicht</h1>
      <div class="btn-group">
        <button class=${"btn btn-small " + (filter === 'offen' ? 'btn-primary' : 'btn-ghost')} onClick=${() => setFilter('offen')}>Offen (${items.filter(x => !x.erledigt).length})</button>
        <button class=${"btn btn-small " + (filter === 'alle' ? 'btn-primary' : 'btn-ghost')} onClick=${() => setFilter('alle')}>Alle (${items.length})</button>
        <button class="btn btn-ghost btn-small" onClick=${load}>🔄 Aktualisieren</button>
      </div>
    </div>
    ${loading && html`<div class="alert alert-info">⏳ Wird geladen…</div>`}
    ${!loading && isDemo && html`<div class="alert alert-warning">Im Demo-Modus gibt es keine echten Feedback-Einträge.</div>`}
    ${!loading && !isDemo && shown.length === 0 && html`<div class="alert alert-info">Keine ${filter === 'offen' ? 'offenen' : ''} Feedback-Einträge vorhanden.</div>`}
    ${shown.map(f => html`
      <div class="card" style=${"border-left:4px solid " + (f.erledigt ? 'var(--success)' : 'var(--krs-blau)') + ";margin-bottom:12px;"}>
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;">
          <div style="flex:1;">
            <div style="font-size:13px;color:var(--text-muted);margin-bottom:4px;">
              ${new Date(f.erstellt_am).toLocaleString('de-DE')} · Bereich: <strong>${f.view || '–'}</strong>
            </div>
            <div style="font-size:18px;margin-bottom:6px;">${stars(f.rating)}</div>
            ${f.text && html`<p style="margin:0;font-size:14px;">${f.text}</p>`}
          </div>
          ${!f.erledigt && html`
            <button class="btn btn-success btn-small" onClick=${() => markDone(f.id)}>✓ Erledigt</button>
          `}
        </div>
      </div>
    `)}
  `;
}

  return html`
    <div class="main-header">
      <h1 class="main-title">⚙️ Phase wechseln</h1>

          <div style="display:flex;align-items:center;gap:10px;">
            <div style=${"width:20px;height:20px;border-radius:50%;border:2px solid " + (p.id === phase ? 'var(--krs-blau)' : 'var(--border)') + ";" + (p.id === phase ? 'background:var(--krs-blau);' : '')}></div>
            <div style="flex:1;">
              <strong>${p.label}</strong>${p.id === phase ? ' (aktuell)' : ''}
