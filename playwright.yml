name: Test & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'admin-dashboard-v2.html'
      - 'schueler-frontend-v3.html'
      - 'index.html'
      - 'tests/**'
      - 'playwright.config.ts'
      - 'package.json'
      - '.github/workflows/playwright.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Job 1: E2E-Tests ────────────────────────────────────────────────────────
  e2e:
    name: E2E-Tests (28 Specs / 70 Tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 14

  # ── Job 2: Deploy → GitHub Pages (nur bei grünem e2e auf main) ──────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: e2e
    runs-on: ubuntu-latest
    # Nur bei Push auf main (nicht bei PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      pages: write       # GitHub Pages deployen dürfen
      id-token: write    # OIDC-Token für Pages-Deployment

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site als Pages-Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Ganzen Repo-Root deployen (HTML + alle Assets)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
